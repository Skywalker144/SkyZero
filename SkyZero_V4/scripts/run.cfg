#!/bin/bash
# SkyZero V4 Pipeline Configuration
# Sourced by run.sh and selfplay.sh — uncomment and modify to override defaults.
# All variables here can also be overridden via environment: GPU=1 bash run.sh

# =============================================================================
# Pipeline
# =============================================================================
# GPU="0"                         # CUDA_VISIBLE_DEVICES
# BASEDIR="../data"               # Root data directory
# BATCHSIZE="512"                 # Batch size (must match shuffle & train)
# NTHREADS="16"                   # Shuffle parallel threads

# =============================================================================
# Game
# =============================================================================
# BOARD_SIZE="15"
# RENJU="true"                    # "true" or "false"
# OPENINGS=""                     # Path to opening book file (empty = none)
# EMPTY_BOARD_PROB="0.0"          # Probability of empty board vs opening

# =============================================================================
# MCTS
# =============================================================================
# NUM_SIMULATIONS="256"
# GUMBEL_M="16"
# GUMBEL_C_VISIT="50.0"
# GUMBEL_C_SCALE="1.0"
# C_PUCT="1.1"
# HALF_LIFE="-1"                  # Default: board_size
# MOVE_TEMP_INIT="1.1"
# MOVE_TEMP_FINAL="1.0"
# ENABLE_SVB="true"               # Subtree Value Bias
# SVB_FACTOR="0.35"

# =============================================================================
# Playout Cap Randomization (KataGo-style training efficiency)
# =============================================================================
# Most positions use CHEAP_SIMULATIONS; a fraction FULL_SEARCH_PROB use full.
# Cheap rows are written with weight CHEAP_SAMPLE_WEIGHT and their policy
# target is excluded from training (policy_weight=0).
# FULL_SEARCH_PROB="0.25"         # 0 disables PCR entirely (all full)
# CHEAP_SIMULATIONS="64"          # Must be >= CHEAP_GUMBEL_M
# CHEAP_GUMBEL_M="8"
# CHEAP_SAMPLE_WEIGHT="0.1"

# =============================================================================
# Uncertainty-Weighted MCTS Backup (requires value_error head)
# =============================================================================
# Backup weight = clamp((nn_value_error + prior)^-exponent, 0, max_weight).
# Gumbel policy-improvement guarantee preserved (only affects Q/N averages,
# not the selection rule).
# ENABLE_UNCERTAINTY_WEIGHTING="true"
# UNCERTAINTY_PRIOR="0.25"
# UNCERTAINTY_EXPONENT="1.0"
# UNCERTAINTY_MAX_WEIGHT="8.0"

# =============================================================================
# Parallel Selfplay
# =============================================================================
# NUM_WORKERS="32"                # Selfplay worker threads
# NUM_SERVERS="1"                 # Inference server threads
# INFERENCE_BATCH="256"           # Max inference batch size
# INFERENCE_BATCH_WAIT_US="1500"  # Batch wait time (microseconds)
# LEAF_BATCH="32"                 # Leaf batch size for MCTS

# =============================================================================
# Selfplay Output
# =============================================================================
# MAX_GAMES="4000"                # Games per selfplay iteration (-1 = infinite, Ctrl+C to stop)
# MAX_ROWS_PER_FILE="25000"       # Max rows per NPZ file
# MODEL_CHECK_MS="10000"          # Model check interval (ms)

# =============================================================================
# Surprise Weighting
# =============================================================================
# POLICY_SURPRISE_WEIGHT="0.5"
# VALUE_SURPRISE_WEIGHT="0.1"

# =============================================================================
# Soft Resign
# =============================================================================
# SOFT_RESIGN_THRESHOLD="0.9"
# SOFT_RESIGN_PROB="0.7"

# =============================================================================
# Fork Side Positions (KataGo-style data diversity)
# =============================================================================
# With probability FORK_SIDE_PROB, each full-search selfplay step pushes
# the state-after-2nd-best-NN-move into a global fork queue; new games
# pop from it before falling back to random opening.
# FORK_SIDE_PROB="0.04"           # 0 disables fork
# MAX_FORK_QUEUE="1000"
# FORK_SKIP_FIRST_N="3"           # no forks during first N moves

# =============================================================================
# Training (Python train.sh)
# =============================================================================
# LR="1e-4"
# WEIGHT_DECAY="3e-5"
# USE_FP16="true"
# SWA_SCALE="1.0"
# LOOKAHEAD_K="6"
# LOOKAHEAD_ALPHA="0.5"
# SAMPLES_PER_EPOCH="1024000"
# MAX_EPOCHS="1"                  # Epochs per training iteration
# VALUE_ERROR_LOSS_WEIGHT="0.05"  # Shortterm value-error head loss weight
