# Config for evaluation (scripts/eval.sh → cpp/build/gomoku_eval).
# Drives BOTH the shell runner (anchor selection, stride, game counts) and
# the C++ eval binary (MCTS search params). Each side ignores keys it does
# not recognize, so one file covers everything.

# ==== Anchor selection ====================================================
# Directory holding anchor .pt files. Absolute, or relative to repo root.
ANCHOR_DIR=anchors
# Whitelist: space- or comma-separated filenames under ANCHOR_DIR.
# Leave empty to use every *.pt in ANCHOR_DIR.
ANCHORS=b3c64s5e7.pt

# ==== Batch sweep =========================================================
# Evaluate every STRIDE-th checkpoint in data/models/ (plus the latest).
STRIDE=40
# Games per (target, anchor) pair. Existing pairs with >= NUM_GAMES are skipped.
NUM_GAMES=20

# ==== Board / network topology (must match trained models) ================
BOARD_SIZE=15
NUM_PLANES=4

# ==== MCTS ================================================================
NUM_SIMULATIONS=256
# Shared-tree parallel search threads. NN forward is serialized by a mutex,
# so gains come from CPU-side select/backprop; 4-8 is the sweet spot.
SEARCH_THREADS_PER_TREE=8
GUMBEL_M=16
GUMBEL_C_VISIT=50.0
GUMBEL_C_SCALE=1.0
# Eval forces gumbel noise OFF in C++ regardless of this value.
GUMBEL_NOISE_ENABLED=0
C_PUCT=1.1
C_PUCT_LOG=0.45
C_PUCT_BASE=500.0
FPU_REDUCTION_MAX=0.16
ROOT_FPU_REDUCTION_MAX=0.16
FPU_POW=1.0
FPU_LOSS_PROP=0.0
MOVE_TEMPERATURE_INIT=0.0
MOVE_TEMPERATURE_FINAL=0.0
HALF_LIFE=-1

# ==== Inference symmetry / stochastic transform ==========================
ENABLE_STOCHASTIC_TRANSFORM_ROOT=1
ENABLE_STOCHASTIC_TRANSFORM_CHILD=1
ENABLE_SYMMETRY_ROOT=0
ENABLE_SYMMETRY_CHILD=0
