# SkyZero V4 Selfplay Configuration Reference
# These values are passed as command-line args to the selfplay binary.
# Edit run.sh or pass them as environment variables.

# === Game ===
# --board-size 15
# --renju                    (default: on)
# --openings openings.txt
# --empty-board-prob 0.0

# === MCTS ===
# --num-simulations 32
# --gumbel-m 16
# --gumbel-c-visit 50.0
# --gumbel-c-scale 1.0
# --c-puct 1.1
# --half-life 15             (default: board_size)
# --move-temp-init 1.1
# --move-temp-final 1.0
# --enable-svb               (Subtree Value Bias)
# --svb-factor 0.35

# === NN ===
# --num-blocks 4
# --num-channels 128
# --device cuda               (auto-detect by default)

# === Parallel ===
# --num-workers 32
# --num-servers 1
# --inference-batch 64
# --inference-batch-wait-us 250
# --leaf-batch 8

# === Selfplay Output ===
# --model-dir data/models
# --output-dir data/selfplay
# --max-games 4000
# --max-rows-per-file 25000
# --model-check-ms 10000

# === Surprise Weighting ===
# --policy-surprise-weight 0.5
# --value-surprise-weight 0.1

# === Soft Resign ===
# --soft-resign-threshold 0.9
# --soft-resign-prob 0.7
