# Shared machine-local paths used by every script:
#   - run.sh, elo.sh, play.sh, play_web.sh, bench.sh, build.sh
#   - internal/{selfplay,shuffle,train,export,selfplay_daemon}.sh
# Callers that source this file (other than build.sh) must set ROOT first.
#
# Precedence for every variable below:
#   paths.cfg.local (if it force-assigns with `=`)
#     > env var (if already set)
#       > value here
# Each line uses `${VAR:-default}` so env var wins over `paths.cfg`; to also
# let env win over `.local`, write `VAR="${VAR:-...}"` inside .local.
# Quick one-off without touching files:
#   VAR=value bash scripts/<script>.sh
#
# See SETUP.md for a fresh-server walkthrough.

# --- Training data root ---------------------------------------------------
DATA_DIR="${DATA_DIR:-$ROOT/data_b10c256_b19_renju_run_final}"

# --- Build dependencies (consumed by scripts/build.sh) --------------------
# LIBTORCH: directory containing share/cmake/Torch/TorchConfig.cmake.
# Default points at PyTorch's bundled LibTorch in a typical conda install —
# this is by design: using the same LibTorch as Python guarantees ABI match.
# Find your actual path with:
#   python -c 'import torch, os; print(os.path.dirname(torch.__file__))'
LIBTORCH="${LIBTORCH:-/root/miniconda3/lib/python3.12/site-packages/torch}"

# NVCC: CUDA compiler. nvcc is usually not on PATH after a runfile install;
# the apt package puts it at /usr/local/cuda-XX.Y/bin/nvcc with a
# /usr/local/cuda symlink. Override if yours lives elsewhere.
NVCC="${NVCC:-/usr/local/cuda/bin/nvcc}"

# --- Python interpreter ---------------------------------------------------
# Used by run.sh and internal/{selfplay,selfplay_daemon,shuffle,train,export}.sh
# as `"$PY" script.py`. Override per-server in paths.cfg.local.
PY="${PY:-/root/miniconda3/bin/python}"

# Server-local override (not in git — see .gitignore: scripts/*.local).
# Each training server writes its own paths.cfg.local with DATA_DIR / LIBTORCH
# / NVCC as needed. set -a so values export to subprocesses, matching how
# run.cfg's overrides work.
if [[ -f "${BASH_SOURCE[0]}.local" ]]; then
    set -a
    # shellcheck disable=SC1090
    source "${BASH_SOURCE[0]}.local"
    set +a
fi
