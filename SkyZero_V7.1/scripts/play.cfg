# Config for human-vs-AI play (scripts/play.sh / scripts/play_web.sh).
# Board size / rule come from run.cfg's MAIN_BOARD_SIZE / MAIN_RULE; this
# file only holds MCTS / inference settings — tune freely without touching
# training.

# ==== Network topology (must match trained model) =========================
NUM_PLANES=5

# ==== MCTS (heavier than selfplay for stronger play) ======================
NUM_SIMULATIONS=256
# Shared-tree parallel search threads. NN forward is serialized by a mutex,
# so benefits come from CPU-side select/backprop; 4-8 is the sweet spot.
SEARCH_THREADS_PER_TREE=8
GUMBEL_M=16
GUMBEL_C_VISIT=50.0
GUMBEL_C_SCALE=1.0
GUMBEL_NOISE_ENABLED=0
C_PUCT=1.1
C_PUCT_LOG=0.45
C_PUCT_BASE=500.0
FPU_REDUCTION_MAX=0.16
FPU_POW=1.0
FPU_LOSS_PROP=0.0

# Variance-scaled cpuct (KataGo searchexplorehelpers.cpp:280-297, v1.9+).
# Should match training-time setting in run.cfg.
CPUCT_UTILITY_STDEV_PRIOR=0.40
CPUCT_UTILITY_STDEV_PRIOR_WEIGHT=2.0
CPUCT_UTILITY_STDEV_SCALE=0.85

# ==== Inference symmetry / stochastic transform ===========================
# Play defaults: all transforms OFF for fastest single-forward inference.
# Useful when comparing low-sims MCTS against pure NN (NUM_SIMULATIONS=0).
# Set ENABLE_SYMMETRY_*=1 if you want the stronger 8-fold ensemble.
ENABLE_STOCHASTIC_TRANSFORM_ROOT=0
ENABLE_STOCHASTIC_TRANSFORM_CHILD=0
ENABLE_SYMMETRY_ROOT=0
ENABLE_SYMMETRY_CHILD=0

# Default OFF so a newly-spawned gomoku_play process (e.g. AI-first /new)
# doesn't race against the stdin "prune 0" command from the web toggle.
ROOT_SYMMETRY_PRUNING=0
