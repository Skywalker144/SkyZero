# PPO on Channel-Dodge — the validated high-score recipe + multi-process speedup.
#
# This is the standard config for retraining after a game-config change:
#   1. sync the gameplay constants from ../SkyZeroWeb/channel-dodge.html into env_dodge.py
#   2. ./retrain.sh <name>      (from scratch — a config change invalidates old policies)
#
#   python train_ppo.py configs/dodge.cfg
#   python train_ppo.py configs/dodge.cfg --set num_workers=12   # more cores if free

# --- environment ---
OBS_MODE=vector         # vector (MLP, finer perception) | grid (CNN)
ACTION_MODE=discrete    # discrete (9 moves) — continuous tried, underperformed here
MAX_STEPS=18000         # 10-min episode cap: lets survival/score grow into the thousands
REWARD_SCALE=1.0

# --- network ---
HIDDEN="256, 256"
CHANNELS="32, 64"       # only used when OBS_MODE=grid

# --- PPO core ---
# Speedup knob: spread NUM_ENVS over NUM_WORKERS processes (the pure-Python env is
# the bottleneck; the net is tiny). Keep BATCH = NUM_ENVS*NUM_STEPS ~ 4096 to keep
# the same update count / sample-efficiency as the validated 16x256 run — just
# faster wall-clock (~2.6x at 64x64/8w, ~3.7x at 128x32/12w).
TOTAL_STEPS=30000000    # full recipe reaches ~1300 avg; 0 = train forever
NUM_ENVS=64             # parallel environments
NUM_WORKERS=8           # processes to spread them over (1 = single-process)
NUM_STEPS=64            # rollout length per env -> batch = 64*64 = 4096
GAMMA=0.99
GAE_LAMBDA=0.95
UPDATE_EPOCHS=4
NUM_MINIBATCHES=4
CLIP_COEF=0.2
CLIP_VLOSS=1
ENT_COEF=0.01
VF_COEF=0.5
MAX_GRAD_NORM=0.5
NORM_ADV=1
TARGET_KL=0.0

# --- optimization ---
LR=3e-4
ANNEAL_LR=1

# --- logging / eval / io ---
LOG_EVERY=10            # updates per log line
EVAL_EVERY=200          # updates per evaluation (batch 4096 -> ~every 820k steps)
EVAL_EPISODES=10
PLOT=1
RUNS_DIR=runs           # outputs go to runs/<run_name>/  (best.pt final.pt train.csv eval.csv progress.png run.cfg)
RUN_NAME=dodge_v3
SEED=0
DEVICE=auto
