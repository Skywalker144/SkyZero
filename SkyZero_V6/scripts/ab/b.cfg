# B side: KataGomo vanilla PUCT (cPUCT + variance-scaled cpuct + FPU).
# Pair-controlled with a.cfg — every knob below MUST match a.cfg except
# SEARCH_ALGO, otherwise the Elo difference attributes to the wrong factor.

# ==== Search budget ======================================================
NUM_SIMULATIONS=400
SEARCH_THREADS_PER_TREE=4

# ==== Gumbel (kept for symmetry; SEARCH_ALGO=puct ignores them) ==========
GUMBEL_M=16
GUMBEL_C_VISIT=50.0
GUMBEL_C_SCALE=1.0
GUMBEL_NOISE_ENABLED=0

# ==== PUCT (interior layers — both engines share these) ==================
C_PUCT=1.1
C_PUCT_LOG=0.45
C_PUCT_BASE=500.0
CPUCT_UTILITY_STDEV_PRIOR=0.40
CPUCT_UTILITY_STDEV_PRIOR_WEIGHT=2.0
CPUCT_UTILITY_STDEV_SCALE=0.85

# ==== FPU ================================================================
FPU_REDUCTION_MAX=0.2
FPU_POW=1.0
FPU_LOSS_PROP=0.0
HALF_LIFE=0

# ==== Inference symmetry / stochastic transform ==========================
ENABLE_STOCHASTIC_TRANSFORM_ROOT=1
ENABLE_STOCHASTIC_TRANSFORM_CHILD=1
ENABLE_SYMMETRY_ROOT=0
ENABLE_SYMMETRY_CHILD=0
ROOT_SYMMETRY_PRUNING=1

# ==== Search algorithm ===================================================
# puct = KataGomo vanilla AlphaZero (PUCT all the way down from root).
SEARCH_ALGO=puct
ROOT_NOISE_ENABLED=0
ROOT_DIRICHLET_TOTAL_CONCENTRATION=10.83
ROOT_NOISE_WEIGHT=0.25

# KataGo extras (Phase 2).
NN_POLICY_TEMPERATURE=1.0
ROOT_FPU_REDUCTION_MAX=0.1
ROOT_FPU_LOSS_PROP=0.0

# VCFsolver tactical override (off — would mask pure search-algo effect).
USE_VCT=0
VCT_MAX_NODES=50000
USE_VCT_AT_ROOT_ONLY=0
