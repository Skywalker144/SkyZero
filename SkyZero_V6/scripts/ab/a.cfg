# ==== Search budget ======================================================
NUM_SIMULATIONS=24
SEARCH_THREADS_PER_TREE=4

# ==== Gumbel =============================================================
GUMBEL_M=16
GUMBEL_C_VISIT=50.0
GUMBEL_C_SCALE=1.0
GUMBEL_NOISE_ENABLED=0

# ==== PUCT ===============================================================
C_PUCT=1.1
C_PUCT_LOG=0.45
C_PUCT_BASE=500.0
CPUCT_UTILITY_STDEV_PRIOR=0.40
CPUCT_UTILITY_STDEV_PRIOR_WEIGHT=2.0
CPUCT_UTILITY_STDEV_SCALE=0.85

# ==== FPU ================================================================
FPU_REDUCTION_MAX=0.2
FPU_POW=1.0
FPU_LOSS_PROP=0.0
HALF_LIFE=0

# ==== Inference symmetry / stochastic transform ==========================
ENABLE_STOCHASTIC_TRANSFORM_ROOT=1
ENABLE_STOCHASTIC_TRANSFORM_CHILD=1
ENABLE_SYMMETRY_ROOT=0
ENABLE_SYMMETRY_CHILD=0
ROOT_SYMMETRY_PRUNING=1

# ==== Search algorithm ===================================================
# gumbel = GumbelAlphaZero; puct = KataGomo vanilla AlphaZero.
SEARCH_ALGO=gumbel
ROOT_NOISE_ENABLED=0
ROOT_DIRICHLET_TOTAL_CONCENTRATION=10.83
ROOT_NOISE_WEIGHT=0.25

# KataGo extras (Phase 2).
NN_POLICY_TEMPERATURE=1.0
ROOT_FPU_REDUCTION_MAX=0.1
ROOT_FPU_LOSS_PROP=0.0
