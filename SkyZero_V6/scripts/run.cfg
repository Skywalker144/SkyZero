MAIN_BOARD_SIZE=15
MAIN_RULE=renju

MAX_BOARD_SIZE=17

NUM_PLANES=6
NUM_GLOBAL_FEATURES=14

NUM_BLOCKS=10
NUM_CHANNELS=128

BOARD_SIZES="17, 16, 15, 14, 13"
BOARD_SIZE_RELPROBS="20, 15, 15, 10, 5"
RULES="renju, standard, freestyle"
RULE_RELPROBS="1, 0, 0"

# MCTS
# KataGo-paper-aligned visit warmup over first NUM_SIM_WARMUP_SAMPLES rows.
# Both NUM_SIMULATIONS and CHEAP_SEARCH_VISITS ramp on the same window
# (5 stages each, evenly spaced). After warmup, steady-state = last stage =
# NUM_SIMULATIONS / CHEAP_SEARCH_VISITS below.
#   full visits:  600 → 700 → 800 → 900 → 1000
#   cheap visits: 100 → 125 → 150 → 175 → 200
NUM_SIMULATIONS=1000
NUM_SIMULATIONS_STAGES="600, 700, 800, 900, 1000"
NUM_SIM_WARMUP_SAMPLES=2e7

# Gumbel Sequential Havling
GUMBEL_M=16
GUMBEL_C_VISIT=50.0
GUMBEL_C_SCALE=1.0

# C_PUCT
# C_PUCT_LOG: KataGo 上游 selfplay 阶段调度(early=0.0 → mid-run=0.22 →
# 后期 b18 main=0.28)。KataGomo 所有 selfplay cfg 停在 0.0(早期默认)。
# V6 取 0.1 作为 early→mid 的 warmup 值。
C_PUCT=1.1
C_PUCT_LOG=0.1
C_PUCT_BASE=500.0

CPUCT_UTILITY_STDEV_PRIOR=0.40
CPUCT_UTILITY_STDEV_PRIOR_WEIGHT=2.0
CPUCT_UTILITY_STDEV_SCALE=0.85

# FPU
FPU_REDUCTION_MAX=0.2
FPU_POW=1.0
FPU_LOSS_PROP=0.0

HALF_LIFE=0  # -1: =board size; 0: off; n: =n
MOVE_TEMPERATURE=1  # Control sampling temperature

# Tree Reuse
ENABLE_TREE_REUSE=1

# Search algorithm. gumbel = GumbelAlphaZero (default, sequential halving);
# puct = KataGomo-aligned vanilla AlphaZero (Dirichlet noise + chosenMove temp).
SEARCH_ALGO=puct

# KataGomo PUCT — root Dirichlet noise (only used when SEARCH_ALGO=puct).
# total_concentration = α * K  (KataGomo default 10.83 ≈ 0.03·361 from AlphaZero Go).
# weight = w in prior' = (1−w)·prior + w·dir.
ROOT_NOISE_ENABLED=1
ROOT_DIRICHLET_TOTAL_CONCENTRATION=10.83
ROOT_NOISE_WEIGHT=0.25

# KataGomo PUCT — chosenMove temperature schedule for selfplay action selection.
# T(m) = T_final + (T_early − T_final) * 2^(−m / halflife_scaled) where
# halflife_scaled = HALFLIFE * (board_area / 19²). T == 0 ⇒ argmax visits.
# subtract drops a flat visit count from each move before tempering;
# prune zeroes any move with strictly fewer than `prune` visits.
CHOSEN_MOVE_TEMPERATURE=0.15
CHOSEN_MOVE_TEMPERATURE_EARLY=0.75
CHOSEN_MOVE_TEMPERATURE_HALFLIFE=19
CHOSEN_MOVE_SUBTRACT=0
CHOSEN_MOVE_PRUNE=1

# KataGo nneval.cpp:696. NN policy temperature applied to legal logits before
# softmax (root + child). T > 1 flattens, T < 1 sharpens, 1 = identity. Affects
# both Gumbel and PUCT — changing this with SEARCH_ALGO=gumbel may need a
# corresponding GUMBEL_C_VISIT retune.
NN_POLICY_TEMPERATURE=1.0

# KataGo searchexplorehelpers.cpp:287. Root vs non-root FPU split. Root needs
# less reduction because root Q is never consumed upstream — large FPU there
# wastes sims on long-tail children. KataGo defaults: root 0.1, non-root 0.2.
ROOT_FPU_REDUCTION_MAX=0.0
ROOT_FPU_LOSS_PROP=0.0

# KataGomo VCFsolver tactical override (Pattern 2). When USE_VCT=1, every NN
# forward runs a VCFsolver for the side-to-move; on a definitive tactical win
# the legal mask is collapsed to the winning move and value is forced to
# (1,0,0). Default OFF — flip to 1 once the lifted solver has been validated
# in selfplay smoke tests. USE_VCT_AT_ROOT_ONLY=1 calls VCT only at the root
# of each move (cheaper, ~+30 Elo); 0 = per-NN-forward (KataGomo-aligned, ~+50
# Elo, 50× more solver calls).
USE_VCT=1
VCT_MAX_NODES=50000
USE_VCT_AT_ROOT_ONLY=0

# KataGomo Playout Doubling Advantage (program/play.cpp:427-440 + 1027-1051).
# Per-game coin flip: with PDA_NORMAL_PROB the favored side gets up to
# PDA_MAX_RATIO× as many MCTS simulations, training the network to
# play asymmetric positions robustly. PDA_MIN_VISITS_FLOOR is a runtime
# safety check (KataGomo play.cpp:1047 hard floor = 5).
# Disabled by default; turn on once baseline is stable.
PDA_NORMAL_PROB=0.01
PDA_MAX_RATIO=8.0
PDA_MIN_VISITS_FLOOR=5

# Fork pool (docs/v6_fork_pool_design.md). KataGomo-style cross-game position
# sharing. FORK_LOAD_PROB=0 + FORK_SAVE_PROB=0 disables. Recommended once
# baseline 收敛: 0.05 / 0.10. FORK_RANDOM_TOP_K>0 plays one uniform-random move
# from the NN's top-K legal moves immediately after a fork-load to add extra
# trajectory divergence; default 0 disables.
FORK_LOAD_PROB=0.0
FORK_SAVE_PROB=0.0
FORK_POOL_CAP=10000
FORK_MIN_MOVE_TO_SAVE=8
FORK_RANDOM_TOP_K=0

# KataGomo PCR (Playout Cap Randomization, play.cpp:946-981). Per move,
# Bernoulli(CHEAP_SEARCH_PROB) decides cheap vs full. Cheap path: drop sims
# to CHEAP_SEARCH_VISITS, multiply step_sample_weight by
# CHEAP_SEARCH_TARGET_WEIGHT, and skip root noise. Full path: normal sims
# (may still be reduced by reduceVisits below). The two paths are mutually
# exclusive — cheap takes priority. KataGomo selfplay8b: 0.75/200/0.0.
# V6 default 0.0 disables PCR (back-compat with pre-PR-D behavior).
CHEAP_SEARCH_PROB=0.75
CHEAP_SEARCH_VISITS=200
CHEAP_SEARCH_VISITS_STAGES="100, 125, 150, 175, 200"
CHEAP_SEARCH_TARGET_WEIGHT=0.0

# Post-export probe: MCTS simulations used by mcts_probe on an empty board.
PROBE_NUM_SIMULATIONS=400

# Inference symmetry / stochastic transform
ENABLE_STOCHASTIC_TRANSFORM_ROOT=1
ENABLE_STOCHASTIC_TRANSFORM_CHILD=1
ENABLE_SYMMETRY_ROOT=0
ENABLE_SYMMETRY_CHILD=0

# Balanced opening
BALANCE_OPENING_PROB=0.8
BALANCED_OPENING_MAX_TRIES=20
BALANCED_OPENING_AVG_DIST_FACTOR=0.8
BALANCED_OPENING_REJECT_PROB=0.995
BALANCED_OPENING_REJECT_PROB_FALLBACK=0.8

POLICY_INIT_AVG_MOVE_NUM=12.0
POLICY_INIT_TEMPERATURE=1.0

# Soft-resign (KataGomo reduceVisits-aligned).
# eff_min = max(MIN_FLOOR, num_simulations * FRACTION)
SOFT_RESIGN_THRESHOLD=0.9
SOFT_RESIGN_STEP_THRESHOLD=3
SOFT_RESIGN_SAMPLE_WEIGHT=0.1
REDUCED_VISITS_FRACTION=0.25    # KG selfplay8a 100/400
REDUCED_VISITS_MIN_FLOOR=32     # = GUMBEL_M

# Surprise weighting
POLICY_SURPRISE_DATA_WEIGHT=0.45
VALUE_SURPRISE_DATA_WEIGHT=0.09

# Training
BATCH_SIZE=256
TRAIN_STEPS_PER_EPOCH=15000
TRAIN_STEPS_STAGES="2000, 5000, 10000, 15000"
TRAIN_STEPS_WARMUP_SAMPLES=2e7
ENABLE_AMP=1

LR=4e-5
WEIGHT_DECAY=3e-5
GRAD_CLIP=1.0

# LR warmup
ENABLE_LR_WARMUP=1
LR_WARMUP_SAMPLES=6e6

# Replay window / pipeline control
TARGET_REPLAY_RATIO=4
# Per-iter warmup: N stages evenly spread over REPLAY_RATIO_WARMUP_SAMPLES
# cumulative rows, then steady at the last value. <2 entries disables warmup.
REPLAY_RATIO_STAGES="3, 4"
REPLAY_RATIO_WARMUP_SAMPLES=6e6
# KataGomo three-parameter power-law window, anchored at (M, M), slope IWPR at M:
#   N <= M:  W(N) = N                                      (training skipped)
#   N >  M:  W(N) = (N^E - M^E) / (E * M^(E-1)) * IWPR + M
MIN_ROWS=250000              # M
TAPER_WINDOW_EXPONENT=0.65   # E (0.65–0.675)
EXPAND_WINDOW_PER_ROW=0.4    # IWPR
# Hard cap on rows retained per shuffle. When pool > KEEP_TARGET_ROWS we
# uniform-randomly subsample (KataGo behavior; keeps a tail of older data).
KEEP_TARGET_ROWS=20000000
MIN_GAMES=200
MAX_GAMES=100000
AVG_GAME_LEN_BOOTSTRAP=70

# Shuffle
SHUFFLE_WORKERS=10
# Pipeline overlap: shuffle(N-1) runs in parallel with selfplay(N); 0 = sequential.
OVERLAP_SHUFFLE=1

# Parallel SelfPlay (run.sh auto-assigns GPU 0 to the pipeline, extras to selfplay daemons).
# NUM_WORKERS / NUM_INFERENCE_SERVERS are per-GPU. Main loop applies them on
# MAIN_GPU; daemon multiplies by n_spare_gpus. Override per-side with
# DAEMON_NUM_WORKERS / DAEMON_NUM_INFERENCE_SERVERS.
NUM_WORKERS=64
NUM_INFERENCE_SERVERS=2
INFERENCE_BATCH_SIZE=256
LEAF_BATCH_SIZE=24
INFERENCE_WAIT_US=30

# Shared paths live in scripts/paths.cfg. Override there or via `export DATA_DIR=...`.

PY=/home/sky/anaconda3/envs/pytorch/bin/python
