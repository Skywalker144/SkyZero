# Active selfplay config: Gumbel SH, sims=400, no PCR, USE_VCT=0 — algorithmic
# alignment with V5. PUCT-only knobs (ROOT_NOISE_*, CHOSEN_MOVE_*, ROOT_FPU_*,
# CHEAP_SEARCH_*) are left in place but never read on the Gumbel path.

MAIN_BOARD_SIZE=15
MAIN_RULE=renju

MAX_BOARD_SIZE=19

NUM_PLANES=6
NUM_GLOBAL_FEATURES=14

# Multi-slot training. Four parallel comma-separated lists:
#   MODEL_SLOTS              slot names (used as subdir names: checkpoints/<slot>/, models/<slot>/)
#   MODEL_BLOCKS             num_blocks per slot
#   MODEL_CHANNELS           num_channels per slot
#   MODEL_ACTIVATE_SAMPLES   cumulative selfplay samples threshold; the largest
#                            slot whose threshold has been crossed becomes the
#                            "active" slot and selfplay reads its TorchScript via
#                            data/models/latest.pt. First entry MUST be 0;
#                            list MUST be strictly increasing. Switch is
#                            forward-only (once a higher slot activates we
#                            don't fall back).
#
# All slots train every iter on the same shuffled data, sequentially on
# MAIN_GPU. See python/slots.py for parsing / promotion logic.
MODEL_SLOTS="b8c128, b10c128, b12c128, b12c196"
MODEL_BLOCKS="8, 10, 12, 12"
MODEL_CHANNELS="128, 128, 128, 196"
MODEL_ACTIVATE_SAMPLES="0, 2e7, 5e7, 7e7"

# Aligned with KataGomo selfplay8b/8b20 bSizeRelProbs (re-ordered descending,
# 7/8 dropped — renju too cramped). KG odd: 7=1,9=4,11=3,13=10,15=7,17=9,19=60.
# KG even: 8=1,10=2,12=4,14=6,16=8,18=10.
BOARD_SIZES="19, 18, 17, 16, 15, 14, 13, 12, 11, 10, 9"
BOARD_SIZE_RELPROBS="60, 10, 9, 8, 7, 6, 10, 4, 3, 2, 4"
RULES="renju, standard, freestyle"
RULE_RELPROBS="1, 0, 0"

# MCTS
# Without PCR every move pays full sims, so steady-state per-move cost
# = NUM_SIMULATIONS. 768 sits between KG selfplay8a (600) and selfplay8b (1000).
NUM_SIMULATIONS=768
NUM_SIMULATIONS_STAGES="32, 32, 64, 128, 192, 256, 384, 512, 768"
NUM_SIM_WARMUP_SAMPLES=4e7

# Gumbel Sequential Havling
GUMBEL_M=16
GUMBEL_C_VISIT=50.0
GUMBEL_C_SCALE=1.0
# Tree reuse across moves.
#   PUCT selfplay (SEARCH_ALGO=puct): HARD-aligned to KataGo — full search
#   clears tree every move regardless of this flag (see selfplay_manager.h,
#   mirroring KataGo play.cpp:1051+1175-1176). Only the cheap-keep-noise
#   step (CHEAP_SEARCH_PROB hit AND CHEAP_SEARCH_TARGET_WEIGHT ≤ 0) reuses.
#   Gumbel selfplay: this flag is honored. Gumbel SH is algorithmically
#   lossless under reuse (per-arm top-up + σ_q clamp at planned_max_n=
#   NUM_SIMULATIONS in alphazero_{parallel,tree_parallel}.h).
#   Match/elo/play/ab binaries: this flag is honored regardless of algo.
ENABLE_TREE_REUSE=1

# C_PUCT — applied at non-root descent (Gumbel root uses SH, not PUCT).
# C_PUCT_LOG: KataGo 上游 selfplay 阶段调度(early=0.0 → mid-run=0.22 →
# 后期 b18 main=0.28)。KataGomo 所有 selfplay cfg 停在 0.0(早期默认)。
# V6 取 0.2 作为 early→mid 的 warmup 值,与 run.cfg 保持一致。
C_PUCT=1.1
C_PUCT_LOG=0.2
C_PUCT_BASE=500.0

CPUCT_UTILITY_STDEV_PRIOR=0.40
CPUCT_UTILITY_STDEV_PRIOR_WEIGHT=2.0
# 0.0 = KataGomo selfplay default (variance-scaled cpuct disabled).
# forTestsV2 / eval profile uses 0.85; keep that in elo.cfg / play.cfg.
CPUCT_UTILITY_STDEV_SCALE=0.0

# FPU
FPU_REDUCTION_MAX=0.2
FPU_POW=1.0
FPU_LOSS_PROP=0.0

HALF_LIFE=0  # -1: =board size; 0: off; n: =n
MOVE_TEMPERATURE=1  # Control sampling temperature

# Search algorithm. gumbel = GumbelAlphaZero (default, sequential halving);
# puct = KataGomo-aligned vanilla AlphaZero (Dirichlet noise + chosenMove temp).
SEARCH_ALGO=gumbel

# KataGomo PUCT — root Dirichlet noise (only used when SEARCH_ALGO=puct).
# total_concentration = α * K  (KataGomo default 10.83 ≈ 0.03·361 from AlphaZero Go).
# weight = w in prior' = (1−w)·prior + w·dir.
ROOT_NOISE_ENABLED=1
ROOT_DIRICHLET_TOTAL_CONCENTRATION=10.83
ROOT_NOISE_WEIGHT=0.25

# KataGomo PUCT — chosenMove temperature schedule for selfplay action selection.
# Gumbel path uses MOVE_TEMPERATURE + HALF_LIFE instead; the fields below are
# read only when SEARCH_ALGO=puct.
CHOSEN_MOVE_TEMPERATURE=0.15
CHOSEN_MOVE_TEMPERATURE_EARLY=0.75
CHOSEN_MOVE_TEMPERATURE_HALFLIFE=19
CHOSEN_MOVE_SUBTRACT=0
CHOSEN_MOVE_PRUNE=1

# KataGo nneval.cpp:696. NN policy temperature applied to legal logits before
# softmax (root + child). T > 1 flattens, T < 1 sharpens, 1 = identity. Affects
# both Gumbel and PUCT — changing this with SEARCH_ALGO=gumbel may need a
# corresponding GUMBEL_C_VISIT retune.
NN_POLICY_TEMPERATURE=1.0

# KataGo searchexplorehelpers.cpp:287. Root vs non-root FPU split. Only used
# by PUCT root descent; Gumbel root selects via sequential halving and does
# not read these fields.
ROOT_FPU_REDUCTION_MAX=0.0
ROOT_FPU_LOSS_PROP=0.0

# KataGomo VCFsolver tactical override (Pattern 2). Algorithm-agnostic — fires
# at NN-eval time regardless of SEARCH_ALGO. Kept on for V5+ Gumbel runs.
USE_VCT=0
VCT_MAX_NODES=50000
USE_VCT_AT_ROOT_ONLY=0

# KataGomo Playout Doubling Advantage (program/play.cpp:427-440 + 1027-1051).
# Algorithm-agnostic — only redistributes num_simulations; works equally with
# Gumbel SH (just changes the per-side budget).
PDA_NORMAL_PROB=0.01
PDA_MAX_RATIO=8.0
PDA_MIN_VISITS_FLOOR=5

# Fork pool. KataGomo selfplay8a/8b: earlyForkGameProb=0.04 + forkGameProb=0.01
# → aggregate ~5% fork rate. V6 pool samples uniformly from positions ≥
# FORK_MIN_MOVE_TO_SAVE, closer to KG's forkGame (any-time mid-game). Set
# load=save=0.05 for aggregate-rate alignment (pool warms up in ~minutes).
FORK_LOAD_PROB=0.05
FORK_SAVE_PROB=0.05
FORK_POOL_CAP=10000
FORK_MIN_MOVE_TO_SAVE=8
FORK_RANDOM_TOP_K=0

# KataGomo PCR — DISABLED for Gumbel.
# PCR's per-move-cost discount relies on tree-reuse cheaply absorbing the
# parent subtree's visit stats (PUCT reads them directly via N_child + Q).
# Gumbel SH at root re-samples G every search() call and allocates a fresh
# halving budget; cheap=100 spread across m=16 phase-0 actions gives
# ~1-2 visits per action, which is too noisy. CHEAP_SEARCH_VISITS_STAGES
# left in place purely for diff-against-run.cfg readability.
CHEAP_SEARCH_PROB=0.0
CHEAP_SEARCH_VISITS=200
CHEAP_SEARCH_VISITS_STAGES="100, 125, 150, 175, 200"
CHEAP_SEARCH_TARGET_WEIGHT=0.0

# Post-export probe: MCTS simulations used by mcts_probe on an empty board.
PROBE_NUM_SIMULATIONS=400

# Inference symmetry / stochastic transform
ENABLE_STOCHASTIC_TRANSFORM_ROOT=1
ENABLE_STOCHASTIC_TRANSFORM_CHILD=1
ENABLE_SYMMETRY_ROOT=0
ENABLE_SYMMETRY_CHILD=0

# Balanced opening
BALANCE_OPENING_PROB=0.8
BALANCED_OPENING_MAX_TRIES=20
BALANCED_OPENING_AVG_DIST_FACTOR=0.8
BALANCED_OPENING_REJECT_PROB=0.995
BALANCED_OPENING_REJECT_PROB_FALLBACK=0.8

POLICY_INIT_AVG_MOVE_NUM=12.0
POLICY_INIT_TEMPERATURE=1.0

# Soft-resign (KataGomo reduceVisits-aligned).
# eff_min = max(MIN_FLOOR, num_simulations * FRACTION)
SOFT_RESIGN_THRESHOLD=0.9
SOFT_RESIGN_STEP_THRESHOLD=3
SOFT_RESIGN_SAMPLE_WEIGHT=0.1
REDUCED_VISITS_FRACTION=0.25    # KG selfplay8a 100/400
REDUCED_VISITS_MIN_FLOOR=32     # = GUMBEL_M

# Surprise weighting
POLICY_SURPRISE_DATA_WEIGHT=0.45
VALUE_SURPRISE_DATA_WEIGHT=0.09

# Training
BATCH_SIZE=256
TRAIN_STEPS_PER_EPOCH=15000
TRAIN_STEPS_STAGES="2000, 3000, 4000, 5000, 7500, 10000, 15000"
TRAIN_STEPS_WARMUP_SAMPLES=3e7
ENABLE_AMP=1

LR=3e-5
WEIGHT_DECAY=3e-5
GRAD_CLIP=1.0

# LR warmup
ENABLE_LR_WARMUP=1
LR_WARMUP_SAMPLES=1e7

# Replay window / pipeline control
TARGET_REPLAY_RATIO=6
# Per-iter warmup: N stages evenly spread over REPLAY_RATIO_WARMUP_SAMPLES
# cumulative rows, then steady at the last value. <2 entries disables warmup.
REPLAY_RATIO_STAGES="3, 4"
REPLAY_RATIO_WARMUP_SAMPLES=6e6
# KataGomo three-parameter power-law window, anchored at (M, M), slope IWPR at M:
#   N <= M:  W(N) = N                                      (training skipped)
#   N >  M:  W(N) = (N^E - M^E) / (E * M^(E-1)) * IWPR + M
MIN_ROWS=250000              # M
TAPER_WINDOW_EXPONENT=0.65   # E (0.65–0.675)
EXPAND_WINDOW_PER_ROW=0.4    # IWPR
# Hard cap on rows retained per shuffle. When pool > KEEP_TARGET_ROWS we
# uniform-randomly subsample (KataGo behavior; keeps a tail of older data).
KEEP_TARGET_ROWS=20000000
# Delete NPZs that fall outside the (cumulatively-walked) pool window after each
# shuffle so disk usage stays bounded. Pruned rows are tracked in
# data/logs/pruned_rows.tsv; cumulative-produced totals used by warmup /
# compute_games / pool_rows snapshots remain monotonic via that log.
# Set =0 to retain every NPZ ever generated (old behavior).
PRUNE_OUTSIDE_WINDOW=1
MIN_GAMES=200
MAX_GAMES=100000
AVG_GAME_LEN_BOOTSTRAP=70

# Shuffle
SHUFFLE_WORKERS=10
# Pipeline overlap: shuffle(N-1) runs in parallel with selfplay(N); 0 = sequential.
OVERLAP_SHUFFLE=1

# Parallel SelfPlay (run.sh auto-assigns GPU 0 to the pipeline, extras to selfplay daemons).
NUM_WORKERS=64
NUM_INFERENCE_SERVERS=2
INFERENCE_BATCH_SIZE=256
LEAF_BATCH_SIZE=24
INFERENCE_WAIT_US=30

# Shared paths live in scripts/paths.cfg. Override there or via `export DATA_DIR=...`.

PY=/home/sky/anaconda3/envs/pytorch/bin/python
