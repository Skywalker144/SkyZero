# V6 single-GPU sps bench — apples-to-apples with V5 4090 baseline.
# Match V5 cfg exactly where applicable: Gumbel, sims=400, no PCR, USE_VCT=0.
# Single-stage NUM_SIMULATIONS so sps is steady-state from move 1.

MAIN_BOARD_SIZE=15
MAIN_RULE=renju

MAX_BOARD_SIZE=17

NUM_PLANES=6
NUM_GLOBAL_FEATURES=14

NUM_BLOCKS=10
NUM_CHANNELS=128

BOARD_SIZES="17, 16, 15, 14, 13"
BOARD_SIZE_RELPROBS="20, 15, 15, 10, 5"
RULES="renju, standard, freestyle"
RULE_RELPROBS="1, 0, 0"

# MCTS — steady-state sims=400, no warmup staging.
NUM_SIMULATIONS=400
NUM_SIMULATIONS_STAGES="400"
NUM_SIM_WARMUP_SAMPLES=0

# Gumbel
GUMBEL_M=16
GUMBEL_C_VISIT=50.0
GUMBEL_C_SCALE=1.0

# C_PUCT (only used at non-root descent)
C_PUCT=1.1
C_PUCT_LOG=0.1
C_PUCT_BASE=500.0

CPUCT_UTILITY_STDEV_PRIOR=0.40
CPUCT_UTILITY_STDEV_PRIOR_WEIGHT=2.0
CPUCT_UTILITY_STDEV_SCALE=0.85

FPU_REDUCTION_MAX=0.2
FPU_POW=1.0
FPU_LOSS_PROP=0.0

HALF_LIFE=0
MOVE_TEMPERATURE=1

ENABLE_TREE_REUSE=1
SEARCH_ALGO=gumbel

# PUCT-only knobs (unread on Gumbel path, kept for parser completeness)
ROOT_NOISE_ENABLED=1
ROOT_DIRICHLET_TOTAL_CONCENTRATION=10.83
ROOT_NOISE_WEIGHT=0.25
CHOSEN_MOVE_TEMPERATURE=0.15
CHOSEN_MOVE_TEMPERATURE_EARLY=0.75
CHOSEN_MOVE_TEMPERATURE_HALFLIFE=19
CHOSEN_MOVE_SUBTRACT=0
CHOSEN_MOVE_PRUNE=1
NN_POLICY_TEMPERATURE=1.0
ROOT_FPU_REDUCTION_MAX=0.0
ROOT_FPU_LOSS_PROP=0.0

# VCT off — match V5 4090 baseline.
USE_VCT=0
VCT_MAX_NODES=50000
USE_VCT_AT_ROOT_ONLY=0

# PDA effectively off (low prob; matches V5 absence).
PDA_NORMAL_PROB=0.01
PDA_MAX_RATIO=8.0
PDA_MIN_VISITS_FLOOR=5

# Fork pool off.
FORK_LOAD_PROB=0.0
FORK_SAVE_PROB=0.0
FORK_POOL_CAP=10000
FORK_MIN_MOVE_TO_SAVE=8
FORK_RANDOM_TOP_K=0

# PCR off (full search every move).
CHEAP_SEARCH_PROB=0.0
CHEAP_SEARCH_VISITS=200
CHEAP_SEARCH_VISITS_STAGES="200"
CHEAP_SEARCH_TARGET_WEIGHT=0.0

PROBE_NUM_SIMULATIONS=400

ENABLE_STOCHASTIC_TRANSFORM_ROOT=1
ENABLE_STOCHASTIC_TRANSFORM_CHILD=1
ENABLE_SYMMETRY_ROOT=0
ENABLE_SYMMETRY_CHILD=0

BALANCE_OPENING_PROB=0.8
BALANCED_OPENING_MAX_TRIES=20
BALANCED_OPENING_AVG_DIST_FACTOR=0.8
BALANCED_OPENING_REJECT_PROB=0.995
BALANCED_OPENING_REJECT_PROB_FALLBACK=0.8

POLICY_INIT_AVG_MOVE_NUM=12.0
POLICY_INIT_TEMPERATURE=1.0

SOFT_RESIGN_THRESHOLD=0.9
SOFT_RESIGN_STEP_THRESHOLD=3
SOFT_RESIGN_SAMPLE_WEIGHT=0.1
REDUCED_VISITS_FRACTION=0.25
REDUCED_VISITS_MIN_FLOOR=32

POLICY_SURPRISE_DATA_WEIGHT=0.45
VALUE_SURPRISE_DATA_WEIGHT=0.09

# Parallel SelfPlay — match V5 baseline defaults exactly.
NUM_WORKERS=64
NUM_INFERENCE_SERVERS=2
INFERENCE_BATCH_SIZE=256
LEAF_BATCH_SIZE=24
INFERENCE_WAIT_US=30

# Training fields are unused by selfplay_main but cfg parser may complain
# without them. Kept here for completeness.
BATCH_SIZE=256
TRAIN_STEPS_PER_EPOCH=15000
TRAIN_STEPS_STAGES="15000"
TRAIN_STEPS_WARMUP_SAMPLES=0
ENABLE_AMP=1
LR=4e-5
WEIGHT_DECAY=3e-5
GRAD_CLIP=1.0
ENABLE_LR_WARMUP=0
LR_WARMUP_SAMPLES=0
TARGET_REPLAY_RATIO=4
REPLAY_RATIO_STAGES="4"
REPLAY_RATIO_WARMUP_SAMPLES=0
MIN_ROWS=250000
TAPER_WINDOW_EXPONENT=0.65
EXPAND_WINDOW_PER_ROW=0.4
KEEP_TARGET_ROWS=20000000
MIN_GAMES=200
MAX_GAMES=100000
AVG_GAME_LEN_BOOTSTRAP=70
SHUFFLE_WORKERS=10
OVERLAP_SHUFFLE=0
