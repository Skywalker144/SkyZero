MAIN_BOARD_SIZE=15
MAIN_RULE=renju

MAX_BOARD_SIZE=17

NUM_PLANES=5
NUM_GLOBAL_FEATURES=12

NUM_BLOCKS=10
NUM_CHANNELS=128

BOARD_SIZES="17, 16, 15, 14, 13"
BOARD_SIZE_RELPROBS="20, 15, 15, 10, 5"
RULES="renju, standard, freestyle"
RULE_RELPROBS="1, 0, 0"

# MCTS
NUM_SIMULATIONS=400
NUM_SIMULATIONS_STAGES="32, 32, 64, 128, 256, 400"
NUM_SIM_WARMUP_SAMPLES=2e7

# Gumbel Sequential Havling
GUMBEL_M=16
GUMBEL_C_VISIT=50.0
GUMBEL_C_SCALE=1.0

# C_PUCT
C_PUCT=1.1
C_PUCT_LOG=0.45
C_PUCT_BASE=500.0

CPUCT_UTILITY_STDEV_PRIOR=0.40
CPUCT_UTILITY_STDEV_PRIOR_WEIGHT=2.0
CPUCT_UTILITY_STDEV_SCALE=0.85

# FPU
FPU_REDUCTION_MAX=0.2
FPU_POW=1.0
FPU_LOSS_PROP=0.0

HALF_LIFE=0  # -1: =board size; 0: off; n: =n
MOVE_TEMPERATURE=1  # Control sampling temperature

# Tree Reuse
ENABLE_TREE_REUSE=1

# Post-export probe: MCTS simulations used by mcts_probe on an empty board.
PROBE_NUM_SIMULATIONS=400

# Inference symmetry / stochastic transform
ENABLE_STOCHASTIC_TRANSFORM_ROOT=1
ENABLE_STOCHASTIC_TRANSFORM_CHILD=1
ENABLE_SYMMETRY_ROOT=0
ENABLE_SYMMETRY_CHILD=0

# Balanced opening
BALANCE_OPENING_PROB=0.8
BALANCED_OPENING_MAX_TRIES=20
BALANCED_OPENING_AVG_DIST_FACTOR=0.8
BALANCED_OPENING_REJECT_PROB=0.995
BALANCED_OPENING_REJECT_PROB_FALLBACK=0.8

POLICY_INIT_AVG_MOVE_NUM=12.0
POLICY_INIT_TEMPERATURE=1.0

# Soft-resign (KataGomo reduceVisits-aligned).
# eff_min = max(MIN_FLOOR, num_simulations * FRACTION)
SOFT_RESIGN_THRESHOLD=0.9
SOFT_RESIGN_STEP_THRESHOLD=3
SOFT_RESIGN_SAMPLE_WEIGHT=0.1
REDUCED_VISITS_FRACTION=0.25    # KG selfplay8a 100/400
REDUCED_VISITS_MIN_FLOOR=32     # = GUMBEL_M

# Surprise weighting
POLICY_SURPRISE_DATA_WEIGHT=0.45
VALUE_SURPRISE_DATA_WEIGHT=0.09

# Training
BATCH_SIZE=256
TRAIN_STEPS_PER_EPOCH=15000
TRAIN_STEPS_STAGES="2000, 5000, 10000, 15000"
TRAIN_STEPS_WARMUP_SAMPLES=2e7
ENABLE_AMP=1

LR=4e-5
WEIGHT_DECAY=3e-5
GRAD_CLIP=1.0

# LR warmup
ENABLE_LR_WARMUP=1
LR_WARMUP_SAMPLES=6e6

# Replay window / pipeline control
TARGET_REPLAY_RATIO=4
# Per-iter warmup: N stages evenly spread over REPLAY_RATIO_WARMUP_SAMPLES
# cumulative rows, then steady at the last value. <2 entries disables warmup.
REPLAY_RATIO_STAGES="3, 4"
REPLAY_RATIO_WARMUP_SAMPLES=6e6
# KataGomo three-parameter power-law window, anchored at (M, M), slope IWPR at M:
#   N <= M:  W(N) = N                                      (training skipped)
#   N >  M:  W(N) = (N^E - M^E) / (E * M^(E-1)) * IWPR + M
MIN_ROWS=250000              # M
TAPER_WINDOW_EXPONENT=0.65   # E (0.65–0.675)
EXPAND_WINDOW_PER_ROW=0.4    # IWPR
MIN_GAMES=200
MAX_GAMES=100000
AVG_GAME_LEN_BOOTSTRAP=70

# Shuffle
SHUFFLE_WORKERS=10
# Pipeline overlap: shuffle(N-1) runs in parallel with selfplay(N); 0 = sequential.
OVERLAP_SHUFFLE=1

# Parallel SelfPlay (run.sh auto-assigns GPU 0 to the pipeline, extras to selfplay daemons).
NUM_WORKERS=64
NUM_INFERENCE_SERVERS=2
INFERENCE_BATCH_SIZE=256
LEAF_BATCH_SIZE=24
INFERENCE_WAIT_US=30

# Shared paths live in scripts/paths.cfg. Override there or via `export DATA_DIR=...`.

PY=/home/sky/anaconda3/envs/pytorch/bin/python
