
# Main BoardSize and Rule
BOARD_SIZE=15
RULE=renju

MAX_BOARD_SIZE=15

NUM_PLANES=5
NUM_GLOBAL_FEATURES=12

NUM_BLOCKS=10
NUM_CHANNELS=128

# Multi BoardSize and Rule in training
BOARD_SIZES="15, 13, 11"
BOARD_SIZE_RELPROBS="1, 0, 0"
RULES="renju, freestyle, standard"
RULE_RELPROBS="1, 0, 0"

# MCTS
NUM_SIMULATIONS=400

# Gumbel Sequential Havling
GUMBEL_M=16
GUMBEL_C_VISIT=50.0
GUMBEL_C_SCALE=1.0

# C_PUCT
C_PUCT=1.1
C_PUCT_LOG=0.45
C_PUCT_BASE=500.0

CPUCT_UTILITY_STDEV_PRIOR=0.40
CPUCT_UTILITY_STDEV_PRIOR_WEIGHT=2.0
CPUCT_UTILITY_STDEV_SCALE=0.85

# FPU
FPU_REDUCTION_MAX=0.2
FPU_POW=1.0
FPU_LOSS_PROP=0.0

# Half Life:
# Used to control the first n steps to sample based on Visit Count
# instead of using Gumbel Action.
HALF_LIFE=0  # -1: =board size; 0: off; n: =n
MOVE_TEMPERATURE=1  # Control sampling temperature

# Tree Reuse
ENABLE_TREE_REUSE=1

# Post-export probe: MCTS simulations used by mcts_probe on an empty board.
PROBE_NUM_SIMULATIONS=512

# Inference symmetry / stochastic transform
ENABLE_STOCHASTIC_TRANSFORM_ROOT=1
ENABLE_STOCHASTIC_TRANSFORM_CHILD=1
ENABLE_SYMMETRY_ROOT=0
ENABLE_SYMMETRY_CHILD=0

# Balanced opening
BALANCE_OPENING_PROB=0.8
BALANCED_OPENING_MAX_TRIES=20
BALANCED_OPENING_AVG_DIST_FACTOR=0.8
BALANCED_OPENING_REJECT_PROB=0.995
BALANCED_OPENING_REJECT_PROB_FALLBACK=0.8

POLICY_INIT_AVG_MOVE_NUM=12.0
POLICY_INIT_TEMPERATURE=1.0

# Soft-resign
SOFT_RESIGN_THRESHOLD=0.9
SOFT_RESIGN_STEP_THRESHOLD=3
SOFT_RESIGN_PROB=0.7
SOFT_RESIGN_SAMPLE_WEIGHT=0.1
MIN_SIMS_IN_SOFT_RESIGN=8

# Surprise weighting + value bootstrap
POLICY_SURPRISE_DATA_WEIGHT=0.45
VALUE_SURPRISE_DATA_WEIGHT=0.09
VALUE_TARGET_MIX_NOW_FACTOR_CONSTANT=0.5

# Training
BATCH_SIZE=256
TRAIN_STEPS_PER_EPOCH=5000
ENABLE_AMP=1
TRAIN_NUM_WORKERS=0

LR=4e-5
WEIGHT_DECAY=3e-5
GRAD_CLIP=1.0

POLICY_LOSS_WEIGHT=1.0
OPP_POLICY_LOSS_WEIGHT=0.15
SOFT_POLICY_LOSS_WEIGHT=8.0
VALUE_LOSS_WEIGHT=0.72
TD_VALUE_LOSS_WEIGHT=0.72
FUTUREPOS_LOSS_WEIGHT=0.25
MAIN_LOSS_SCALE=0.5
INTERMEDIATE_LOSS_SCALE=0.5

# SWA (EMA variant)
ENABLE_SWA=1
SWA_SCALE=8
SWA_PERIOD_STEPS=200

# Lookahead optimizer
LOOKAHEAD_K=6
LOOKAHEAD_ALPHA=0.5

# LR warmup
ENABLE_LR_WARMUP=1
LR_WARMUP_SAMPLES=6000000

# ==== Replay window / pipeline control ====================================
TARGET_REPLAY_RATIO=5
LINEAR_THRESHOLD=5000000
REPLAY_ALPHA=0.8
MIN_GAMES=200
MAX_GAMES=100000
AVG_GAME_LEN_BOOTSTRAP=70
# Cold-start only: first iter targets this many buffer rows
# (N_games ≈ MIN_BUFFER_SIZE / AVG_GAME_LEN_BOOTSTRAP, then clipped by MIN/MAX_GAMES).
MIN_BUFFER_SIZE=200000
# Cold-start only: first iter targets max(MIN_BUFFER_SIZE, steady_needed * multiplier),
# where steady_needed = ceil(BATCH_SIZE * TRAIN_STEPS_PER_EPOCH / TARGET_REPLAY_RATIO).
# Keeps the first training epoch's effective replay ratio low to avoid overfitting.
COLD_START_MULTIPLIER=3
MAX_ROWS_PER_NPZ=25000
SHUFFLE_SHARD_ROWS=200000
# Pool size for shuffle.py (covers both Pass-1 shardify and Pass-2 merge).
# 0/1 = serial (safe fallback).
SHUFFLE_WORKERS=16
# Target rows per shardify task — files are grouped until their summed row
# count reaches this, then the group is handed to one worker. Smaller values
# = more tasks / finer parallelism; larger = fewer intermediate files.
SHUFFLE_WORKER_GROUP_SIZE=200000
# Pipeline overlap: run shuffle(N-1 data) in parallel with selfplay(N).
# Trades a 1-iter lag of training data for saved wall-time per iter.
# Default 0 = legacy strict-sequential behavior.
OVERLAP_SHUFFLE=0

#  Parallel SelfPlay Parameters
NUM_WORKERS=64
NUM_INFERENCE_SERVERS=2
INFERENCE_BATCH_SIZE=256
LEAF_BATCH_SIZE=24
INFERENCE_WAIT_US=30
# Multi-GPU: one GPU index per inference server (comma-separated). Length must
# equal NUM_INFERENCE_SERVERS. Empty = all servers on MAIN_GPU (single-GPU
# legacy). Example for daemon spreading across cuda:1/2/3 with 6 servers:
# "1,2,3,1,2,3". Usually you don't set this directly — selfplay.sh and
# run_selfplay_daemon.sh derive it.
INFERENCE_SERVER_DEVICES=
# Backpressure: max finished games held in memory before workers block.
# 0 = auto (2 * NUM_WORKERS); <0 = unbounded (legacy).
MAX_RESULT_QUEUE_SIZE=0

# ==== Multi-GPU daemon ====================================================
# Layout when GPU_NUM>1: main loop (run.sh) runs selfplay+train+export on
# MAIN_GPU only; a separate run_selfplay_daemon.sh process owns the spare
# GPUs and produces selfplay data continuously, hot-reloading latest.pt
# whenever the main loop exports a new model. Set GPU_NUM=1 (or leave the
# daemon unstarted) to fall back to single-GPU sequential behavior.
MAIN_GPU=0
# Comma-separated GPU indices for the daemon. Empty = "1,2,...,GPU_NUM-1"
# (auto-derived from GPU_NUM by run_selfplay_daemon.sh).
SELFPLAY_DAEMON_GPUS=
# How often the daemon polls latest.pt mtime to detect a new exported model.
DAEMON_RELOAD_POLL_MS=2000
# Daemon's inference-server / worker counts. Empty = inherit the main values
# above. Override when spare GPUs differ in count from main GPU's load profile.
DAEMON_NUM_INFERENCE_SERVERS=
DAEMON_NUM_WORKERS=

# Paths
# ROOT is set by run.sh to the repo root; DATA_DIR is derived from it.
# DATA_DIR="$ROOT/data"    # resolved in run.sh

PY=/home/sky/anaconda3/envs/pytorch/bin/python
