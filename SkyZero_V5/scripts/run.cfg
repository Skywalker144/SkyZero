# All pipeline hyperparameters live here. Both Python (via `set -a` + source)
# and C++ (parsed line by line by selfplay_main) read the same keys.

# 5e7 samples test

# ==== Board / network topology (must match C++ selfplay + Python train) =====
# BOARD_SIZE: legacy single-value default. Read by mcts_probe / eval / play, and
# by selfplay as fallback when BOARD_SIZES (below) is missing/empty.
BOARD_SIZE=15
# MAX_BOARD_SIZE: NN canvas size. NOT a runtime knob — it's a compile-time
# constant in cpp/envs/gomoku.h:65 (Gomoku::MAX_BOARD_SIZE) that fixes the
# trace-time input shape and the canvas-stride MCTS action space. cfg value
# here is asserted == the constant at selfplay startup; mismatch = "you edited
# cfg but forgot to rebuild". To raise: edit gomoku.h, re-trace via
# init_model.py, rebuild C++. All BOARD_SIZES entries must be ≤ this value.
MAX_BOARD_SIZE=15
NUM_PLANES=5                  # V5: mask + own + opp + fb_b + fb_w
NUM_GLOBAL_FEATURES=12        # V5: rule one-hot + ply + VCF placeholders

# b10c128 (~2M params). Auto-derived: c_mid=64, c_gpool=16, c_p1=32, c_g1=32,
# c_v1=32, c_v2=48, intermediate_head_blocks=6.
NUM_BLOCKS=10
NUM_CHANNELS=128

# ==== Multi-size / multi-rule training (V5 Phase 4b) =======================
# Per-game weighted sampling for self-play (KataGomo bSizes / bSizeRelProbs).
# Each game opens with one (size, rule) pair, sampled INDEPENDENTLY from the
# two distributions below at game-start. mcts_probe / eval / play binaries
# ignore these and use the legacy BOARD_SIZE / RULE singletons.
#
#   BOARD_SIZES / BOARD_SIZE_RELPROBS:  same-length lists, weights are relative
#                                       (normalized to a discrete distribution)
#   RULES        / RULE_RELPROBS:       same-length lists; RULES ⊆ {freestyle,
#                                       standard, renju}
#
# Length-1 lists ⇒ effectively single-size / single-rule (defaults below).
# Empty / missing ⇒ fall back to legacy BOARD_SIZE / RULE singletons.
#
# Example mix (rare small boards, mostly 15×15):
#   BOARD_SIZES=11,13,15
#   BOARD_SIZE_RELPROBS=1,1,10        # 11:13:15 ≈ 8.3% / 8.3% / 83.3%
#   RULES=freestyle,standard,renju
#   RULE_RELPROBS=1,1,1
BOARD_SIZES=15
BOARD_SIZE_RELPROBS=1
RULES=renju
RULE_RELPROBS=1
# Legacy single-value field. Still read by eval / play / probe binaries, and
# by selfplay as a fallback when RULES (above) is missing/empty.
RULE=renju                    # one of: freestyle / standard / renju

# ==== MCTS =================================================================
NUM_SIMULATIONS=128
GUMBEL_M=16
GUMBEL_C_VISIT=50.0
GUMBEL_C_SCALE=1.0

C_PUCT=1.1
C_PUCT_LOG=0.45
C_PUCT_BASE=500.0

FPU_REDUCTION_MAX=0.08
ROOT_FPU_REDUCTION_MAX=0.0
FPU_POW=1.0
FPU_LOSS_PROP=0.0

# Variance-scaled cpuct (KataGo searchexplorehelpers.cpp:280-297, v1.9+).
# At non-root nodes, cpuct *= 1 + scale * (stdev/prior - 1) where stdev is
# Bayesian-shrunk per-visit utility stdev. High-variance subtrees get more
# exploration, low-variance ones less. Gumbel root unaffected (uses SH).
# KataGo basic default: 0.25/1.0/0.0 (disabled); test config: 0.40/2.0/0.85.
# Set SCALE=0 to disable.
CPUCT_UTILITY_STDEV_PRIOR=0.40
CPUCT_UTILITY_STDEV_PRIOR_WEIGHT=2.0
CPUCT_UTILITY_STDEV_SCALE=0.85

# HALF_LIFE: opening exploration window. Move sampling rule:
#   move_count < half_life  →  sample ∝ visit_counts^(1/MOVE_TEMPERATURE)
#   otherwise               →  greedy gumbel_action
# Values:
#   >0  : global override (window length in plies, applied to every game)
#   -1  : per-game game_.board_size (auto-adapts to multi-size training)
#    0  : disabled — always greedy from move 0
HALF_LIFE=0
MOVE_TEMPERATURE=1

# Tree reuse (Sprint 2 #3): keep the subtree under the played action as the
# new root each ply. Effective sims/ply ×1.5–3, saves one root NN/ply.
# BatchedLeaf only; auto-disabled if MCTS_BACKEND=shared_tree.
ENABLE_TREE_REUSE=1

# Post-export probe: MCTS simulations used by mcts_probe on an empty board.
# Falls back to NUM_SIMULATIONS if unset.
PROBE_NUM_SIMULATIONS=512

# Inference symmetry / stochastic transform
ENABLE_STOCHASTIC_TRANSFORM_ROOT=1
ENABLE_STOCHASTIC_TRANSFORM_CHILD=1
ENABLE_SYMMETRY_ROOT=0
ENABLE_SYMMETRY_CHILD=0

# ==== Selfplay parallelism (C++) ===========================================
NUM_WORKERS=96
NUM_INFERENCE_SERVERS=2
INFERENCE_BATCH_SIZE=256
LEAF_BATCH_SIZE=24
INFERENCE_WAIT_US=30
# Multi-GPU: one GPU index per inference server (comma-separated). Length must
# equal NUM_INFERENCE_SERVERS. Empty = all servers on MAIN_GPU (single-GPU
# legacy). Example for daemon spreading across cuda:1/2/3 with 6 servers:
# "1,2,3,1,2,3". Usually you don't set this directly — selfplay.sh and
# run_selfplay_daemon.sh derive it.
INFERENCE_SERVER_DEVICES=
# Backpressure: max finished games held in memory before workers block.
# 0 = auto (2 * NUM_WORKERS); <0 = unbounded (legacy).
MAX_RESULT_QUEUE_SIZE=0

# ==== Multi-GPU daemon ====================================================
# Layout when GPU_NUM>1: main loop (run.sh) runs selfplay+train+export on
# MAIN_GPU only; a separate run_selfplay_daemon.sh process owns the spare
# GPUs and produces selfplay data continuously, hot-reloading latest.pt
# whenever the main loop exports a new model. Set GPU_NUM=1 (or leave the
# daemon unstarted) to fall back to single-GPU sequential behavior.
MAIN_GPU=0
# Comma-separated GPU indices for the daemon. Empty = "1,2,...,GPU_NUM-1"
# (auto-derived from GPU_NUM by run_selfplay_daemon.sh).
SELFPLAY_DAEMON_GPUS=
# How often the daemon polls latest.pt mtime to detect a new exported model.
DAEMON_RELOAD_POLL_MS=2000
# Daemon's inference-server / worker counts. Empty = inherit the main values
# above. Override when spare GPUs differ in count from main GPU's load profile.
DAEMON_NUM_INFERENCE_SERVERS=
DAEMON_NUM_WORKERS=

# ==== MCTS backend (A/B switch) =============================================
# batched_leaf: single-threaded search, batches leaves within one search via
#               virtual loss (default; used with large NUM_WORKERS).
# shared_tree : KataGo-style multi-threaded search, SEARCH_THREADS_PER_TREE
#               threads descend the same tree concurrently. When enabled,
#               LEAF_BATCH_SIZE is ignored; fair A/B uses NUM_WORKERS /
#               SEARCH_THREADS_PER_TREE workers so total search threads match.
MCTS_BACKEND=batched_leaf
SEARCH_THREADS_PER_TREE=4

# ==== Balanced opening (KataGomo-style) ===================================
BALANCE_OPENING_PROB=0.7
BALANCED_OPENING_MAX_TRIES=20
BALANCED_OPENING_AVG_DIST_FACTOR=0.8
BALANCED_OPENING_REJECT_PROB=0.995
BALANCED_OPENING_REJECT_PROB_FALLBACK=0.8

# Policy-initialization (KataGomo initGamesWithPolicy). After balanced opening,
# play ~Exp(1)*AVG_MOVE_NUM extra moves sampled from NN policy^(1/T) to push
# the start off the "both sides look balanced" plateau. Set AVG=0 to disable.
# KataGomo selfplay1.cfg defaults: avg=12, temperature=1.0.
POLICY_INIT_AVG_MOVE_NUM=12.0
POLICY_INIT_TEMPERATURE=1.0

# ==== Soft-resign =========================================================
SOFT_RESIGN_THRESHOLD=0.9
SOFT_RESIGN_STEP_THRESHOLD=3
SOFT_RESIGN_PROB=0.7
SOFT_RESIGN_SAMPLE_WEIGHT=0.1
MIN_SIMS_IN_SOFT_RESIGN=8

# ==== Surprise weighting + value bootstrap ================================
POLICY_SURPRISE_DATA_WEIGHT=0.5
VALUE_SURPRISE_DATA_WEIGHT=0.1
VALUE_TARGET_MIX_NOW_FACTOR_CONSTANT=0.5

# ==== Training (Python) ===================================================
BATCH_SIZE=256
TRAIN_STEPS_PER_EPOCH=5000
ENABLE_AMP=1
# DataLoader workers for train.py. 0 = no workers (safe: dataset is already
# in RAM, workers would only fork-copy it and inflate memory).
TRAIN_NUM_WORKERS=0

LR=4e-5
WEIGHT_DECAY=3e-5
GRAD_CLIP=1.0

POLICY_LOSS_WEIGHT=1.0
OPP_POLICY_LOSS_WEIGHT=0.15
# Soft-policy heads (PolicyHead idx 2 / 3): target = (p+1e-7)^0.25 normalized,
# trains the network to also predict "everything reasonable" not just the top
# move. KataGomo argparse default = 8.0. Effective weight on the soft-opp head
# is OPP_POLICY_LOSS_WEIGHT × SOFT_POLICY_LOSS_WEIGHT (= 0.15×8.0 = 1.2),
# matching KataGomo metrics_pytorch.py:526-531.
SOFT_POLICY_LOSS_WEIGHT=8.0
# WDL value head. KataGomo effective weight = 1.20 × value_loss_scale (0.6) =
# 0.72 (metrics_pytorch.py:71 + train.py:103). Aligned with td_value so the
# two value-related signals carry equal weight, matching KataGomo's balance.
VALUE_LOSS_WEIGHT=0.72
# TD value (3 horizons × WDL) — KataGomo metrics_pytorch.py:73-79 + train.py:103-104,
# effective weight = 1.20 × td_value_loss_scale (0.6) = 0.72.
TD_VALUE_LOSS_WEIGHT=0.72
# Futurepos (+8/+32 step occupancy) — KataGomo metrics_pytorch.py:114-130
# uses outer scale 0.25 with channel weights [1.0, 0.25].
FUTUREPOS_LOSS_WEIGHT=0.25
# Mid-trunk auxiliary head (KataGo §7). All main head losses are mirrored on
# the intermediate-trunk output and combined as a weighted average:
#   total_loss = MAIN_LOSS_SCALE × main + INTERMEDIATE_LOSS_SCALE × intermediate
# Aligned with KataGomo train.py:541-552 (-ih config: intermediate head in
# trunk middle → 0.5/0.5). Setting INTERMEDIATE_LOSS_SCALE=0 disables the
# intermediate path; in that case set MAIN_LOSS_SCALE=1.0 to keep main at full
# magnitude.
MAIN_LOSS_SCALE=0.5
INTERMEDIATE_LOSS_SCALE=0.5

# SWA (EMA variant, mirrors KataGomo). When enabled, train.py wraps the model
# with torch.optim.swa_utils.AveragedModel and updates every SWA_PERIOD_STEPS
# SGD steps with EMA factor 1/SWA_SCALE. Per-iter snapshots & export pick up
# the EMA weights automatically.
ENABLE_SWA=1
SWA_SCALE=8
SWA_PERIOD_STEPS=200

# Lookahead optimizer (KataGo-style in-loop, train.py:852-858, 1521-1543).
# Wraps AdamW: every LOOKAHEAD_K fast steps, slow_w ← slow_w + α(fast_w-slow_w),
# fast_w ← slow_w. Opt's internal LR is auto-divided by alpha so user's LR
# remains the "effective" LR. SWA only snapshots when synced, so SWA + LA
# coexist correctly. LOOKAHEAD_K=0 disables. KataGo defaults: k=6, alpha=0.5.
LOOKAHEAD_K=6
LOOKAHEAD_ALPHA=0.5

# LR warmup (KataGomo train.py:594-603 fixscale path). 5-stage stairstep
# multiplies LR by {0.20, 0.33, 0.50, 0.71, 1.00} at progress 1/6, 1/3, 2/3,
# 1.0 of LR_WARMUP_SAMPLES. Stabilizes AdamW second-moment estimates before
# full-LR steps. Resume-safe: warmup factor is recomputed from cumulative
# global_step samples on each step. Set ENABLE_LR_WARMUP=0 to disable.
ENABLE_LR_WARMUP=1
LR_WARMUP_SAMPLES=6000000

# ==== Replay window / pipeline control ====================================
TARGET_REPLAY_RATIO=5
LINEAR_THRESHOLD=5000000
REPLAY_ALPHA=0.8
MIN_GAMES=200
MAX_GAMES=100000
AVG_GAME_LEN_BOOTSTRAP=70
# Cold-start only: first iter targets this many buffer rows
# (N_games ≈ MIN_BUFFER_SIZE / AVG_GAME_LEN_BOOTSTRAP, then clipped by MIN/MAX_GAMES).
MIN_BUFFER_SIZE=200000
# Cold-start only: first iter targets max(MIN_BUFFER_SIZE, steady_needed * multiplier),
# where steady_needed = ceil(BATCH_SIZE * TRAIN_STEPS_PER_EPOCH / TARGET_REPLAY_RATIO).
# Keeps the first training epoch's effective replay ratio low to avoid overfitting.
COLD_START_MULTIPLIER=3
MAX_ROWS_PER_NPZ=25000
SHUFFLE_SHARD_ROWS=200000
# Pool size for shuffle.py (covers both Pass-1 shardify and Pass-2 merge).
# 0/1 = serial (safe fallback).
SHUFFLE_WORKERS=16
# Target rows per shardify task — files are grouped until their summed row
# count reaches this, then the group is handed to one worker. Smaller values
# = more tasks / finer parallelism; larger = fewer intermediate files.
SHUFFLE_WORKER_GROUP_SIZE=200000
# Pipeline overlap: run shuffle(N-1 data) in parallel with selfplay(N).
# Trades a 1-iter lag of training data for saved wall-time per iter.
# Default 0 = legacy strict-sequential behavior.
OVERLAP_SHUFFLE=0

# ==== Paths ==============================================================
# ROOT is set by run.sh to the repo root; DATA_DIR is derived from it.
# DATA_DIR="$ROOT/data"    # resolved in run.sh

# Python interpreter. Point this at the conda env that has a CUDA-enabled
# torch build; otherwise train.py silently falls back to CPU.
PY=/home/sky/anaconda3/envs/pytorch/bin/python

# ==== Quick (smoke) mode: uncomment to override for fast iteration ========
# NUM_WORKERS=2
# NUM_INFERENCE_SERVERS=1
# INFERENCE_BATCH_SIZE=4
# NUM_SIMULATIONS=8
# MIN_GAMES=5
# MAX_GAMES=20
# BATCH_SIZE=32
# TRAIN_STEPS_PER_EPOCH=5
