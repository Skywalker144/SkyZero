# Config for evaluation (scripts/eval.sh → cpp/build/gomoku_eval).
# Drives BOTH the shell runner (anchor selection, stride, game counts) and
# the C++ eval binary (MCTS search params). Each side ignores keys it does
# not recognize, so one file covers everything.

# ==== Anchor selection ====================================================
# Directory holding anchor .pt files. Absolute, or relative to repo root.
ANCHOR_DIR=anchors
# Whitelist: space- or comma-separated filenames under ANCHOR_DIR.
# Leave empty to use every *.pt in ANCHOR_DIR.
ANCHORS=b4c64iter180.pt

# ==== Batch sweep =========================================================
# Evaluate every STRIDE-th checkpoint in data/models/ (plus the latest).
STRIDE=20
# Games per (target, anchor) pair. Existing pairs with >= NUM_GAMES are skipped.
NUM_GAMES=50

# ==== Board / network topology (must match trained models) ================
BOARD_SIZE=15
NUM_PLANES=5

# ==== Concurrency (eval-only) ============================================
# Number of games played in parallel by gomoku_eval. Each worker owns its own
# pair of MCTS trees and routes inference through shared per-model batched
# servers, so larger values keep the GPU fed.
NUM_CONCURRENT_GAMES=20
# Per-model inference server: max batch size and how long (microseconds) the
# server waits to fill a batch after the first request arrives.
INFERENCE_BATCH_SIZE=64
INFERENCE_WAIT_US=500

# ==== MCTS ================================================================
NUM_SIMULATIONS=512
# Shared-tree parallel search threads. NN forward is serialized by a mutex,
# so gains come from CPU-side select/backprop; 4-8 is the sweet spot.
SEARCH_THREADS_PER_TREE=8
# Eval-specific override (lower because game-level concurrency already keeps
# the GPU busy; total threads ~= NUM_CONCURRENT_GAMES * 2 * this).
EVAL_SEARCH_THREADS_PER_TREE=4
GUMBEL_M=16
GUMBEL_C_VISIT=50.0
GUMBEL_C_SCALE=1.0
# Eval forces gumbel noise OFF in C++ regardless of this value.
GUMBEL_NOISE_ENABLED=0
C_PUCT=1.1
C_PUCT_LOG=0.45
C_PUCT_BASE=500.0
FPU_REDUCTION_MAX=0.16
ROOT_FPU_REDUCTION_MAX=0.16
FPU_POW=1.0
FPU_LOSS_PROP=0.0
HALF_LIFE=0

# Variance-scaled cpuct (KataGo searchexplorehelpers.cpp:280-297, v1.9+).
# Should match training-time setting in run.cfg for consistent eval.
CPUCT_UTILITY_STDEV_PRIOR=0.40
CPUCT_UTILITY_STDEV_PRIOR_WEIGHT=2.0
CPUCT_UTILITY_STDEV_SCALE=0.85

# ==== Final-move selection (eval/play only) ===============================
# LCB picks the root child with the highest mean - k * stderr(Q). Larger k
# = more conservative (avoids low-N children with lucky-high Q). KataGo
# uses 4.0. selfplay never reads this — gumbel argmax is the principled
# selfplay output.
LCB_K=4.0

# ==== Inference symmetry / stochastic transform ==========================
ENABLE_STOCHASTIC_TRANSFORM_ROOT=1
ENABLE_STOCHASTIC_TRANSFORM_CHILD=1
ENABLE_SYMMETRY_ROOT=0
ENABLE_SYMMETRY_CHILD=0
