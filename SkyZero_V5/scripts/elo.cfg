# Config for Elo rating runs (scripts/elo.sh → cpp/build/gomoku_elo).
# Drives BOTH the shell runner (anchor selection, stride, game counts) and
# the C++ elo binary (MCTS search params). Each side ignores keys it does
# not recognize, so one file covers everything.

# ==== Anchor selection (optional) =========================================
# Anchors are only useful for cross-run comparability. For pure within-run
# Elo tracking, leave ANCHORS empty and rely on the neighbor chain below;
# the earliest checkpoint in data/models/ is auto-pinned to Elo 0 by
# python/elo.py:pick_reference.
# Directory holding anchor .pt files. Absolute, or relative to repo root.
ANCHOR_DIR=anchors
# Whitelist: space- or comma-separated filenames under ANCHOR_DIR.
# Leave empty for neighbor-only mode (no anchor matches scheduled).
ANCHORS=b10c128b15iter234.pt

# ==== Batch sweep =========================================================
# Evaluate every STRIDE-th checkpoint in data/models/ (plus the latest).
STRIDE=10
# Games per (target, anchor) pair. Only used when ANCHORS is non-empty.
NUM_GAMES=50

# ==== Neighbor-chain matching ============================================
# Each evaluated checkpoint also plays its NEIGHBOR_K nearest neighbors in
# iteration order (canonical: smaller-iter as model-a). Keeps win rates
# near 50%, where Elo resolution is highest. Set NEIGHBOR_K=0 to disable.
NEIGHBOR_K=2
# Games per (target, neighbor) pair. Pairs with win rate near 50% have far
# higher information per game than near-saturation pairs, so 30 is plenty.
NEIGHBOR_GAMES=30

# ==== Board / network topology (must match trained models) ================
BOARD_SIZE=15
NUM_PLANES=5

# ==== Concurrency (elo-only) =============================================
# Number of games played in parallel by gomoku_elo. Each worker owns its own
# pair of MCTS trees and routes inference through shared per-model batched
# servers, so larger values keep the GPU fed.
NUM_CONCURRENT_GAMES=20
# Per-model inference server: max batch size and how long (microseconds) the
# server waits to fill a batch after the first request arrives.
INFERENCE_BATCH_SIZE=64
INFERENCE_WAIT_US=500

# ==== MCTS ================================================================
NUM_SIMULATIONS=400
# Shared-tree parallel search threads. NN forward is serialized by a mutex,
# so gains come from CPU-side select/backprop; 4-8 is the sweet spot.
SEARCH_THREADS_PER_TREE=8
# Elo-specific override (lower because game-level concurrency already keeps
# the GPU busy; total threads ~= NUM_CONCURRENT_GAMES * 2 * this).
ELO_SEARCH_THREADS_PER_TREE=4
GUMBEL_M=16
GUMBEL_C_VISIT=50.0
GUMBEL_C_SCALE=1.0
# Elo forces gumbel noise OFF in C++ regardless of this value.
GUMBEL_NOISE_ENABLED=0
C_PUCT=1.1
C_PUCT_LOG=0.45
C_PUCT_BASE=500.0
FPU_REDUCTION_MAX=0.2
FPU_POW=1.0
FPU_LOSS_PROP=0.0
HALF_LIFE=0

# Variance-scaled cpuct (KataGo searchexplorehelpers.cpp:280-297, v1.9+).
# Should match training-time setting in run.cfg for consistent Elo runs.
CPUCT_UTILITY_STDEV_PRIOR=0.40
CPUCT_UTILITY_STDEV_PRIOR_WEIGHT=2.0
CPUCT_UTILITY_STDEV_SCALE=0.85

# ==== Inference symmetry / stochastic transform ==========================
# All transforms OFF: fastest single-forward inference, matches play.cfg.
# Flip ENABLE_STOCHASTIC_TRANSFORM_*=1 to randomize a transform per call
# (cheaper than 8-fold ensemble, but adds per-game noise).
ENABLE_STOCHASTIC_TRANSFORM_ROOT=0
ENABLE_STOCHASTIC_TRANSFORM_CHILD=0
ENABLE_SYMMETRY_ROOT=0
ENABLE_SYMMETRY_CHILD=0
