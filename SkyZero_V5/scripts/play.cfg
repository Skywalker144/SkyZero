# Config for human-vs-AI play (scripts/play.sh → cpp/build/gomoku_play).
# Standalone from run.cfg — tune freely without touching training.

# ==== Board / network topology (must match trained model) =================
BOARD_SIZE=15
NUM_PLANES=5

# ==== MCTS (heavier than selfplay for stronger play) ======================
NUM_SIMULATIONS=256
# Shared-tree parallel search threads. NN forward is serialized by a mutex,
# so benefits come from CPU-side select/backprop; 4-8 is the sweet spot.
SEARCH_THREADS_PER_TREE=8
GUMBEL_M=8
GUMBEL_C_VISIT=50.0
GUMBEL_C_SCALE=1.0
GUMBEL_NOISE_ENABLED=0
C_PUCT=1.1
C_PUCT_LOG=0.45
C_PUCT_BASE=500.0
FPU_REDUCTION_MAX=0.16
ROOT_FPU_REDUCTION_MAX=0.16
FPU_POW=1.0
FPU_LOSS_PROP=0.0

HALF_LIFE=0

# Variance-scaled cpuct (KataGo searchexplorehelpers.cpp:280-297, v1.9+).
# Should match training-time setting in run.cfg.
CPUCT_UTILITY_STDEV_PRIOR=0.40
CPUCT_UTILITY_STDEV_PRIOR_WEIGHT=2.0
CPUCT_UTILITY_STDEV_SCALE=0.85

# ==== Final-move selection ================================================
# LCB picks the root child with the highest mean - k * stderr(Q). Larger k
# = more conservative. KataGo uses 4.0.
LCB_K=4.0

# ==== Inference symmetry / stochastic transform ===========================
# Play defaults: disable stochastic (deterministic output), enable 8-fold
# symmetry ensemble for stronger, more consistent evaluations.
ENABLE_STOCHASTIC_TRANSFORM_ROOT=0
ENABLE_STOCHASTIC_TRANSFORM_CHILD=0
ENABLE_SYMMETRY_ROOT=1
ENABLE_SYMMETRY_CHILD=1
