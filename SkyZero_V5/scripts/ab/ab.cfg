# Match-level config for AB hyperparameter evaluation
# (scripts/ab.sh -> cpp/build/gomoku_ab). Drives BOTH the shell runner
# (model selection, total games) and the C++ binary (board topology,
# concurrency, shared inference server). Per-side MCTS knobs live in
# scripts/ab/{a,b}.cfg.

# ==== Models =============================================================
# Space- or comma-separated. Accepts:
#   - "latest"                  -> data/models/latest.pt
#   - "model_iter_NNNNNN.pt"    -> data/models/<name>
#   - absolute path             -> as-is
# Empty falls back to "latest".
MODELS=latest

# ==== Match size =========================================================
# Total games per model. AB testing typically needs more samples than
# anchor Elo to detect ~50/50 winrates with tight CIs.
NUM_GAMES=100

# ==== Output =============================================================
# data/ab/<OUT_NAME>.jsonl and data/ab/<OUT_NAME>.png. Use distinct names
# per experiment to keep results from polluting each other.
OUT_NAME=ab

# ==== Board / network topology (must match trained model) ================
BOARD_SIZE=15
NUM_PLANES=5
RULE=renju

# ==== Concurrency ========================================================
# Worker threads inside one gomoku_ab process. Each worker owns one
# mcts_a + one mcts_b; both submit to the shared inference server.
NUM_CONCURRENT_GAMES=20

# ==== Shared inference server ============================================
# Single BatchedInferenceServer covers both sides because they use the
# same model. Doubles batch fill-rate vs. the gomoku_elo two-server path.
INFERENCE_BATCH_SIZE=64
INFERENCE_WAIT_US=500
