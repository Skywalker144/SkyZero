# Match-level config for PUCT-vs-Gumbel AB. Read by gomoku_ab_puct via
# --config-ab. Per-side MCTS knobs live in a.cfg / b.cfg.

# ==== Match size =========================================================
NUM_GAMES=200

# ==== Output =============================================================
# .jsonl appended; one line per game. python/ab.py-compatible plus the
# extra "algo_a"/"algo_b" fields this build emits.
OUT_NAME=puct_vs_gumbel

# ==== Board / network topology (must match V5 trained model) =============
BOARD_SIZE=15
NUM_PLANES=5
RULE=renju

# ==== Concurrency ========================================================
# Worker threads inside one gomoku_ab_puct process. Each worker owns one
# mcts_a + one mcts_b; both submit to the shared inference server.
NUM_CONCURRENT_GAMES=20

# ==== Shared inference server ============================================
INFERENCE_BATCH_SIZE=64
INFERENCE_WAIT_US=500
