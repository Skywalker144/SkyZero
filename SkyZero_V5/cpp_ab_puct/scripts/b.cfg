# B side: V5's existing Gumbel + sequential halving (no Dirichlet, no
# Gumbel noise). Same NUM_SIMULATIONS as a.cfg.

SEARCH_ALGO=gumbel

# ==== Search budget ======================================================
NUM_SIMULATIONS=128
SEARCH_THREADS_PER_TREE=16

# ==== Gumbel =============================================================
GUMBEL_M=16
GUMBEL_C_VISIT=50.0
GUMBEL_C_SCALE=1.0
GUMBEL_NOISE_ENABLED=0

# ==== PUCT (interior tree descent uses these for Gumbel side too) ========
C_PUCT=1.1
C_PUCT_LOG=0.45
C_PUCT_BASE=500.0
CPUCT_UTILITY_STDEV_PRIOR=0.40
CPUCT_UTILITY_STDEV_PRIOR_WEIGHT=2.0
CPUCT_UTILITY_STDEV_SCALE=0.85

# ==== FPU ================================================================
FPU_REDUCTION_MAX=0.2
FPU_POW=1.0
FPU_LOSS_PROP=0.0
HALF_LIFE=0

# ==== Inference symmetry / stochastic transform ==========================
ENABLE_STOCHASTIC_TRANSFORM_ROOT=1
ENABLE_STOCHASTIC_TRANSFORM_CHILD=1
ENABLE_SYMMETRY_ROOT=0
ENABLE_SYMMETRY_CHILD=0
ROOT_SYMMETRY_PRUNING=1
