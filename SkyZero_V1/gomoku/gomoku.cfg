[train]
num_iterations = 1000
algo = "gumbel"
device = "cuda"
num_workers = 16

[game]
board_size = 15
rule = "renju"

[network]
num_blocks = 6
num_channels = 64

[optimizer]
lr = 0.0001
weight_decay = 0.00003

[mcts]
num_simulations = 400
dirichlet_alpha = 0.3
dirichlet_epsilon = 0.25

[training]
batch_size = 128
train_steps_per_iteration = 100
target_ReplayRatio = 4

[selfplay]
move_temperature = 1.0
half_life = 20

[buffer]
min_buffer_size = 25000
max_buffer_size = 1_000_000
window_exponent = 0.65
window_expand_per_row = 0.4

[surprise]
enable_psw = 0
policy_surprise_data_weight = 0.5
value_surprise_data_weight = 0.1

[checkpoint]
save_interval = 10
print_interval = 20
data_dir = "data/gomoku"
