[Train]
algo = "gumbel"
device = "cuda"
num_workers = 16

[Game]
board_size = 11
rule = "renju"

[Network]
num_blocks = 3
num_channels = 32

[Optimizer]
lr = 1e-4
weight_decay = 3e-5

[MCTS]
num_simulations = 32
enable_pcr = false

[Training]
batch_size = 128
train_steps_per_iteration = 100
target_ReplayRatio = 4
# Policy loss weights (KataGo basicDecent / V5 defaults). 4-head policy net:
# main / opp / soft_main / soft_opp. Soft losses scale = base × soft_w.
policy_loss_weight = 1.0
opp_policy_loss_weight = 0.15
soft_policy_loss_weight = 8.0

[SelfPlay]
move_temperature = 1.0
half_life = 20

[ReplayBuffer]
min_buffer_size = 25000
max_buffer_size = 1e8
window_exponent = 0.65
window_expand_per_row = 0.4

[PolicySurpriseWeighting]
enable_psw = true
policy_surprise_data_weight = 0.5
value_surprise_data_weight = 0.1

[Checkpoint]
save_interval = 100
print_interval = 20
data_dir = "data/gomoku_b3c32_b11_renju"
