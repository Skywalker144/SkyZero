[Train]
max_runtime_seconds = 500
algo = "gumbel"
device = "mps"
num_workers = 12

[Network]
num_blocks = 2
num_channels = 24

[Optimizer]
lr = 1e-4
weight_decay = 3e-5

[MCTS]
num_simulations = 100
enable_pcr = false
fast_search_num_simultions = 20

[Training]
batch_size = 128
train_steps_per_iteration = 50
target_ReplayRatio = 4

[SelfPlay]
move_temperature = 1.0
half_life = 3

[ReplayBuffer]
min_buffer_size = 6400
max_buffer_size = 1e8
window_exponent = 0.65
window_expand_per_row = 0.4

[PolicySurpriseWeighting]
enable_psw = true
policy_surprise_data_weight = 0.5
value_surprise_data_weight = 0.1

[Checkpoint]
save_interval = 20
print_interval = 20
data_dir = "data/tictactoe_puct_100-20_pcr_750s"
