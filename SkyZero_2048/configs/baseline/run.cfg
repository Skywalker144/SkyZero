# 2048 Stochastic Gumbel AlphaZero — VTRANSFORM config (baseline + value h()).
#
# Identical to configs/baseline EXCEPT it turns on the invertible MuZero value
# scaling h() (VALUE_TRANSFORM=1, VALUE_SCALE moved to h-space) and writes to a
# fresh DATA_DIR=data2048_vt. Rationale: the linear raw/VALUE_SCALE target on
# 2048 chases a fat-tailed, high-variance signal (the large discounted returns
# carry the rest-of-game spawn randomness); h() = sign(x)(sqrt(|x|+1)-1)+eps*x
# compresses the big magnitudes far more than the small ones, so the value head
# regresses a lower-variance target and we decode back to raw points for search.
# The value-head OUTPUT SEMANTICS change, so this must start from a fresh data
# dir + fresh init — never resume the linear data2048_td run into this config.
#
# Everything below is inherited from baseline, which folds in everything learned
# from the earlier runs, which oscillated badly (1000-game self-play avg swinging
# 5k<->17k iter-to-iter, value_loss bouncing 0.2<->0.5, policy_loss stuck ~0.8):
#
# earlier runs, which oscillated badly (1000-game self-play avg swinging 5k<->17k
# iter-to-iter, value_loss bouncing 0.2<->0.5, policy_loss stuck ~0.8):
#
#   1. ROOT CAUSE FIX — value target = n-step TD bootstrap on the MCTS search
#      value (MuZero / Stochastic MuZero style; 2048 is a benchmark in that
#      paper), NOT the full Monte-Carlo discounted return-to-go. The MC return on
#      2048 carries the entire rest-of-game spawn randomness (target std ~= the
#      whole VALUE_SCALE); TD(n=10) cut measured target std ~2.5x (6531 -> 2570).
#      See TD_STEPS below and cpp/skyzero_2048.h::compute_value_targets.
#   2. STABILIZERS (carried over from the `stable` run, which already lifted the
#      level) — slower optimizer (LR 5e-4 + GRAD_CLIP 2), ~1 epoch/iter instead
#      of 4 (MAX_TRAIN_PER_DATA, bucket cap) so we stop over-chasing the latest
#      noisy self-play, and a wide shuffle window.
#
# Sourced by scripts/run.sh (plain bash KEY=VALUE), exported to every step script
# + the Python pipeline (model_config.config_from_env reads these).
# Launch:  CONFIG_DIR=configs/baseline bash scripts/run.sh [max_iters]
# Fresh data dir (data2048_td) — do NOT resume the old MC-target runs, or the
# shuffle window would mix MC and TD value targets. See paths.cfg.
#
# FOLLOW-UPS once TD stability is confirmed (relax the band-aids for faster
# learning, change ONE at a time): pull the window back in (KEEP_TARGET_ROWS
# 4M->2M, EXPAND_WINDOW_PER_ROW 1.0->0.6), bump LR back toward 1e-3, raise SIMS
# 64->100+ for sharper policy targets. gamma (0.999) is currently the C++ default
# only, not yet a config var.

# --- training loop / orchestration ---
# No ITERS cap: like SkyZero_V7.1, the loop runs unlimited by default (until
# Ctrl+C). Pass a CLI arg to run.sh/faster_run.sh to cap iters for a one-off.
MAX_TIME_SECONDS=0       # >0: also stop after this many seconds of loop time
OVERLAP_SHUFFLE=1        # 1: run shuffle (CPU) concurrently with selfplay (GPU)
MAIN_GPU=0               # main loop (selfplay/train/export/probe/eval) GPU
EVAL_EVERY_ITERS=5       # run internal/eval.sh every N iters
PROBE_NUM_SIMULATIONS=400 # mcts_probe sims (empty-board root-value diagnostic)
PROGRESS_SECS=15          # self-play prints a games/s progress line every N sec (0=off)
DAEMON_RELOAD_POLL_MS=2000 # selfplay daemon: latest.pt mtime poll interval

# --- multi-network schedule (positionally matched). Single net = one entry. ---
NETWORKS="b3c64, b6c96"
SELFPLAY_SCHEDULE="0, 2e8"

# --- network internals (per-net width derives from the bXcY name) ---
INTERNAL_LENGTH=2        # InnerRes blocks per bottleneck
VALUE_HIDDEN=64
VALUE_SCALE=30           # h-SPACE scale: value head regresses h(score)/VALUE_SCALE
VALUE_TRANSFORM=1         # wrap target in invertible MuZero h() before the scale
                         # divide. h(20k)~160 -> /30 ~ 5, so the head stays in the
                         # same ~O(1-5) range as the old linear raw/4000; decode
                         # inverts h in mcts.py + cpp/infer_server_2048.h.

# --- self-play (C++ parallel: worker threads + central batched inference) ---
GAMES_PER_ITER=1000
# NUM_SIMULATIONS warmup (python/warmup.py, read by selfplay daemon's
# --sims-warmup-cmd). STAGES = sim counts, SCHEDULE = cumulative-selfplay-row
# thresholds, positionally matched; the active stage is the largest threshold
# crossed (read from logs/selfplay.tsv). Both lists must be the same length, else
# it falls back to the fixed SIMS scalar below. Thresholds are CUMULATIVE rows, so
# stages below the current cum_rows (~3e8) are already passed — the ramp here
# bumps search depth as b6c96 comes online (3e8) and data keeps growing, for
# sharper policy/value targets to push past the ~4096-tile plateau.
NUM_SIMULATIONS_STAGES="48, 64, 96, 128, 192, 256"
NUM_SIMULATIONS_SCHEDULE="0, 5e7, 2e8, 4e8, 5e8, 8e8"
SIMS=64                  # fallback when the staged lists are unset/length-mismatched
THREADS=16               # worker threads (CPU tree-traversal parallelism; 20-core box)
SLOT_GAMES=64            # lockstep games per worker (concurrency = THREADS*SLOT_GAMES = 1024)
SERVER_THREADS=2         # inference-server threads (single GPU; >2 just contends the lock)
BATCH=512                # max inference batch
WAIT_US=150              # server batch-accumulation wait (lower: more concurrency fills batches)

# --- value target ---
# n-step TD bootstrap horizon for the self-play value target:
#   z_t = sum_{k<n} gamma^k r_{t+k} + gamma^n * V_search(s_{t+n})   (bootstrap on
#   the MCTS root value; bootstrap term dropped once it reaches terminal).
#   0  -> full Monte-Carlo discounted return-to-go (old behavior; high variance).
TD_STEPS=10

# --- training: token bucket (bucket.py) decides train_steps off shuffled shards ---
LR=0.0005
BATCH_SIZE=128
TRAIN_SAMPLES_PER_EPOCH=256000   # train_steps = epochs * (this // BATCH_SIZE)
MAX_TRAIN_PER_DATA=4             # bucket fill: += new_rows * this (~1 epoch/iter)
MAX_TRAIN_BUCKET_SIZE=300000     # bucket cap
GRAD_CLIP=2.0
EVAL_GAMES=50                    # games per periodic eval

# --- power-law shuffle window (shuffle.py: W(N)=(N^E-M^E)/(E·M^(E-1))·IWPR+M) ---
MIN_ROWS=250000                  # below this total -> skip training, accumulate
TAPER_WINDOW_EXPONENT=0.65       # E
EXPAND_WINDOW_PER_ROW=0.4          # IWPR (aligned to KataGo main-run default; was 1.0)
KEEP_TARGET_ROWS=4000000         # cap rows kept per shuffle

DEVICE=cuda
