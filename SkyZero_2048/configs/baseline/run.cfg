# 2048 Stochastic Gumbel AlphaZero — baseline experiment config (V7.1-style).
#
# Sourced by scripts/run.sh (plain bash KEY=VALUE) and exported to every step
# script + the Python pipeline (model_config.config_from_env reads these).
# Launch with:  CONFIG_DIR=configs/baseline bash scripts/run.sh [max_iters]
#
# DATA_DIR lives in paths.cfg. Per-machine tweaks -> run.cfg.local (gitignored).

# --- training loop / orchestration ---
ITERS=60                 # default max iters (CLI arg to run.sh overrides)
MAX_TIME_SECONDS=0       # >0: also stop after this many seconds of loop time
OVERLAP_SHUFFLE=0        # 1: run shuffle (CPU) concurrently with selfplay (GPU)
MAIN_GPU=0               # main loop (selfplay/train/export/probe/eval) GPU
EVAL_EVERY_ITERS=5       # run internal/eval.sh every N iters
PROBE_NUM_SIMULATIONS=400 # mcts_probe sims (empty-board root-value diagnostic)
PROGRESS_SECS=15          # self-play prints a games/s progress line every N sec (0=off)
DAEMON_RELOAD_POLL_MS=2000 # selfplay daemon: latest.pt mtime poll interval

# --- multi-network schedule (positionally matched). Single net = one entry. ---
#   NETWORKS="b6c96, b10c128"   SELFPLAY_SCHEDULE="0, 2e7"
# Active net for selfplay = largest-index threshold <= cumulative selfplay rows.
NETWORKS="b6c96"
SELFPLAY_SCHEDULE="0"

# --- network internals (per-net width derives from the bXcY name) ---
# C_MID / C_GPOOL auto-derive from each net's channels (max(16,c/2)/max(16,c/8))
# unless pinned here (pinning is global across all NETWORKS — usually leave unset).
# C_MID=48
# C_GPOOL=16
INTERNAL_LENGTH=2        # InnerRes blocks per bottleneck
VALUE_HIDDEN=64
VALUE_SCALE=4000         # value head regresses (discounted score / VALUE_SCALE)

# --- self-play (C++ parallel: worker threads + central batched inference) ---
GAMES_PER_ITER=800
SIMS=64
THREADS=6                # worker threads
SLOT_GAMES=128           # lockstep games per worker (concurrency = THREADS*SLOT_GAMES)
SERVER_THREADS=3         # inference-server threads
BATCH=512                # max inference batch
WAIT_US=500              # server batch-accumulation wait

# --- training: token bucket (bucket.py) decides train_steps off shuffled shards ---
LR=0.002
BATCH_SIZE=128
TRAIN_SAMPLES_PER_EPOCH=256000   # train_steps = epochs * (this // BATCH_SIZE)
MAX_TRAIN_PER_DATA=4.0           # bucket fill: += new_rows * this
MAX_TRAIN_BUCKET_SIZE=512000     # bucket cap
EVAL_GAMES=50                    # games per periodic eval

# --- power-law shuffle window (shuffle.py: W(N)=(N^E-M^E)/(E·M^(E-1))·IWPR+M) ---
MIN_ROWS=250000                  # below this total -> skip training, accumulate
TAPER_WINDOW_EXPONENT=0.65       # E
EXPAND_WINDOW_PER_ROW=0.4        # IWPR
KEEP_TARGET_ROWS=2000000         # cap rows kept per shuffle

DEVICE=cuda
