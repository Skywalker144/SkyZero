# Per-experiment data location (V7.1-style). Machine paths (LIBTORCH/NVCC/PY)
# live in scripts/env_paths.cfg — this file only says WHERE this experiment's
# data lives. run.sh sets ROOT before sourcing.
#
# DATA_DIR holds: models/ (active mirror), nets/<net>/ (per-network checkpoints),
# selfplay/ (npz), shuffled/current/ (train shards), logs/ (tsv + png).
# Fresh dir for the value-h() experiment. Kept separate from the linear-target
# data2048_td run: the value head's output semantics differ (it now predicts
# h(score)/SCALE), so the two must never share a shuffle window or a checkpoint.
DATA_DIR="${DATA_DIR:-$ROOT/data2048_vt}"

# Server-local override (gitignored). Redirect DATA_DIR to another disk here.
if [[ -f "${BASH_SOURCE[0]}.local" ]]; then
    set -a
    # shellcheck disable=SC1090
    source "${BASH_SOURCE[0]}.local"
    set +a
fi
