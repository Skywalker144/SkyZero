MAIN_BOARD_SIZE=11
MAIN_RULE=renju

MAX_BOARD_SIZE=11

NUM_PLANES=5
NUM_GLOBAL_FEATURES=12

# Multi-network training. NETWORKS lists the networks to train each iter
# (all train on the SAME shuffled data each cycle). Names are parsed as
# b<num_blocks>c<num_channels> (see python/model_config.py::
# net_config_from_name).
#
# SELFPLAY_SCHEDULE positionally matches NETWORKS — at any iter, the
# active selfplay network is the one whose threshold (cumulative selfplay
# samples) has been crossed. The lowest threshold should be 0.
NETWORKS="b3c64, b5c128"
SELFPLAY_SCHEDULE="0, 1e7"

BOARD_SIZES="11, 10, 9"
BOARD_SIZE_RELPROBS="80, 15, 5"
RULES="renju, standard, freestyle"
RULE_RELPROBS="1, 0, 0"

# MCTS
# Positionally matched: at cum_rows >= SCHEDULE[i] the corresponding STAGES[i]
# value is active (largest crossed threshold wins). First threshold should be 0.
# Both lists are required and must be the same length — python/warmup.py errors
# out otherwise (no silent fallback).
NUM_SIMULATIONS_STAGES="32, 64, 128, 256, 512, 1024, 2048"
NUM_SIMULATIONS_SCHEDULE="0, 3e6, 6e6, 1e7, 2e7, 5e7, 8e7"

# Gumbel Sequential Havling
GUMBEL_M=16
GUMBEL_C_VISIT=50.0
GUMBEL_C_SCALE=1.0

# Non-root (in-tree) search algorithm. The root always uses Gumbel sequential
# halving; this only switches how children are picked at non-root nodes:
#   puct   — KataGo-style PUCT + FPU + variance-scaled cpuct (default; the
#            original V7.1 behavior).
#   gumbel — the Gumbel paper's deterministic "Full Gumbel" in-tree rule
#            (Danihelka et al. 2022, eq. 14): argmax_a [ π'(a) −
#            N(a)/(1+Σ_b N(b)) ], π' = completed-Q improved policy at the node.
NON_ROOT_SEARCH_ALGO=puct

# C_PUCT
C_PUCT=1.1
C_PUCT_LOG=0.45
C_PUCT_BASE=500.0

CPUCT_UTILITY_STDEV_PRIOR=0.40
CPUCT_UTILITY_STDEV_PRIOR_WEIGHT=2.0
CPUCT_UTILITY_STDEV_SCALE=0.85

# FPU
FPU_REDUCTION_MAX=0.2
FPU_POW=1.0
FPU_LOSS_PROP=0.0

# Tree Reuse
ENABLE_TREE_REUSE=1

# Post-export probe: MCTS simulations used by mcts_probe on an empty board.
PROBE_NUM_SIMULATIONS=1000

# Inference symmetry / stochastic transform
ENABLE_STOCHASTIC_TRANSFORM_ROOT=1
ENABLE_STOCHASTIC_TRANSFORM_CHILD=1
ENABLE_SYMMETRY_ROOT=0
ENABLE_SYMMETRY_CHILD=0

# Balanced opening
BALANCE_OPENING_PROB=0.8
BALANCED_OPENING_MAX_TRIES=20
BALANCED_OPENING_AVG_DIST_FACTOR=0.8
BALANCED_OPENING_REJECT_PROB=0.995
BALANCED_OPENING_REJECT_PROB_FALLBACK=0.8

POLICY_INIT_AVG_MOVE_NUM=12.0
POLICY_INIT_TEMPERATURE=1.0

# Soft-resign (KataGomo reduceVisits-aligned).
# eff_min = max(MIN_FLOOR, num_simulations * FRACTION)
SOFT_RESIGN_THRESHOLD=0.9
SOFT_RESIGN_STEP_THRESHOLD=3
SOFT_RESIGN_SAMPLE_WEIGHT=0.1
REDUCED_VISITS_FRACTION=0.25    # KG selfplay8a 100/400
REDUCED_VISITS_MIN_FLOOR=32     # = GUMBEL_M

# Surprise weighting
POLICY_SURPRISE_DATA_WEIGHT=0.45
VALUE_SURPRISE_DATA_WEIGHT=0.09

# Training
BATCH_SIZE=128
ENABLE_AMP=1

LR=4e-5
WEIGHT_DECAY=3e-5
GRAD_CLIP=1.0

# LR warmup
ENABLE_LR_WARMUP=1
LR_WARMUP_SAMPLES=6e6

# Pipeline (V7.3: FIXED train volume, ORDERED adaptive selfplay — the order
# model replaces the launch-and-wait gate, which replaced the V7.2 token
# bucket. See python/compute_selfplay_target.py and
# docs/design_fixed_train_adaptive_selfplay.md).
#   Each iter:
#     1. train is FIXED:    train_steps = TRAIN_SAMPLES_PER_EPOCH / BATCH_SIZE.
#     2. selfplay ORDERED:  target_cum += TRAIN_SAMPLES_PER_EPOCH /
#        TARGET_REPLAY_RATIO; the deficit vs cumulative selfplay.tsv rows is
#        converted to games (recent rows/game) and split across the train
#        cards as bounded --max-games batches, run before training. Spare
#        cards run the persistent daemon continuously; their settled rows
#        shrink the order — 0 games when production already ran ahead (ratio
#        then floats below target: fresher data, no idle spare cards).
#     3. cold start: first target = MIN_ROWS (produce enough to begin training).
#
#   TARGET_REPLAY_RATIO = soft UPPER bound on "avg # times each row is seen by
#   training" = fixed_train / produced.  needed = SAMPLES_PER_EPOCH / RATIO rows/iter.
TARGET_REPLAY_RATIO=6
TRAIN_SAMPLES_PER_EPOCH=64000       # = 500 steps at batch 128
# Daemon-side stats settlement period (seconds), read by C++ selfplay_main in
# --daemon mode: how often in-flight production is flushed into selfplay.tsv
# so the order calc sees spare-card progress between model reloads. <= 0 =
# settle on reload/exit only (every order would overshoot; keep > 0).
DAEMON_SETTLE_SECONDS=20            # short so smoke tests see spare production fast

# Redraw plots (view_loss.py: loss/selfplay/probe/ratio) only after this many
# new selfplay rows since the last redraw; <= 0 = every training iter.
# Plain integer — consumed by bash arithmetic, no scientific notation.
PLOT_EVERY_SAMPLES=50000

# KataGomo three-parameter power-law window (shuffle.py only — the order
# model above controls train/selfplay cadence; window controls which rows
# shuffle samples from).
#   N <= M:  W(N) = N                                      (shuffle skipped)
#   N >  M:  W(N) = (N^E - M^E) / (E * M^(E-1)) * IWPR + M
MIN_ROWS=125000              # M
TAPER_WINDOW_EXPONENT=0.65   # E (0.65–0.675)
EXPAND_WINDOW_PER_ROW=0.4    # IWPR
# Hard cap on rows retained per shuffle. When pool > KEEP_TARGET_ROWS we
# uniform-randomly subsample (KataGo behavior; keeps a tail of older data).
KEEP_TARGET_ROWS=20000000

# Loop termination by wall-clock time. Checked at the end of each iter, so
# actual stop can overshoot by up to one iter (selfplay+shuffle+train+export,
# typically minutes). Excludes the initial cmake rebuild and model bootstrap.
# Integer seconds. 0 or unset = unlimited (loop until Ctrl+C or max_iters CLI arg).
#   1 hour = 3600, 6 hours = 21600, 1 day = 86400, 3 days = 259200

# Shuffle
SHUFFLE_WORKERS=10
# Pipeline overlap: shuffle(N-1) runs in parallel with iter N's production
# gate wait; 0 = sequential (gate first, then shuffle).
OVERLAP_SHUFFLE=1
# Out-of-window cleanup: shuffle deletes NPZ files past the pool boundary
# (newest-first walk). Disable to keep disk usage growing monotonically.
ENABLE_OOW_CLEANUP=1

# Parallel SelfPlay. Workers/servers are specified **per GPU**. The shell
# wiring multiplies by the number of GPUs each role owns:
#   - per-card batch selfplay (internal/selfplay.sh): × 1 (one GPU each)
#   - daemon (internal/selfplay_daemon.sh): × len(SELFPLAY_DAEMON_GPUS)
# That product is what the C++ binary sees as the absolute thread count.
WORKERS_PER_GPU=64
INFERENCE_SERVERS_PER_GPU=2
INFERENCE_BATCH_SIZE=256
LEAF_BATCH_SIZE=24
INFERENCE_WAIT_US=30

# Shared paths: DATA_DIR lives in configs/<exp>/paths.cfg; LIBTORCH / NVCC /
# PY in scripts/env_paths.cfg. Override via their .local files. Note: this
# file's plain assignments clobber pre-exported env — overrides go in
# run.cfg.local, not `export VAR=...`.
