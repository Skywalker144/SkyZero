# Per-experiment paths. Everything machine-related (LIBTORCH/NVCC/PY) lives in
# scripts/env_paths.cfg — this file only describes WHERE this experiment's data
# lives. Callers (run.sh, elo.sh, etc.) set ROOT before sourcing.
#
# DATA_DIR: where selfplay games, shuffled npzs, model checkpoints, and logs
# go. Pick a unique path per experiment so runs don't contaminate each other.
# Single h()-value track (the value head always uses MuZero h(); see run.cfg).
DATA_DIR="${DATA_DIR:-$ROOT/data2048}"

# Server-local override (rarely needed — configs are usually machine-agnostic;
# use this only if you need to redirect DATA_DIR to a different disk on a
# particular server).
if [[ -f "${BASH_SOURCE[0]}.local" ]]; then
    set -a
    # shellcheck disable=SC1090
    source "${BASH_SOURCE[0]}.local"
    set +a
fi
