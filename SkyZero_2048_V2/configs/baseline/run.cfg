# 2048 Stochastic Gumbel AlphaZero — baseline.
#
# Re-forked from SkyZero V7.8 (2026-06-14). 2048 is a single-agent *stochastic*
# afterstate MDP: scalar expected-discounted-score value (NO WDL), chance nodes,
# no perspective flip. The value head always uses the MuZero invertible scaling
# h() (hardcoded; see the value-semantics block below).
# See ../SkyZero_V7.8/configs/baseline/run.cfg for the mainline (gomoku) version
# this is diffed against, and docs/refactor_plan.md.
#
# Sourced by scripts/run.sh as plain bash KEY=VALUE; the numeric MCTS/selfplay
# knobs are forwarded to the C++ binary (CLI-arg driven: --sims/--gamma/--td-
# steps/--value-scale/...) by internal/*.sh. Launch:
#   CONFIG_DIR=configs/baseline bash scripts/run.sh [max_iters]

# --- board / input planes (2048 is fixed 4x4) ---
MAIN_BOARD_SIZE=4
MAX_BOARD_SIZE=4         # compile-time constant (cmake -D); 4x4 always
NUM_PLANES=16            # 16 one-hot exponent planes (game2048::encode_state)
NUM_GLOBAL_FEATURES=0    # 2048 net is conv-only over the 16 planes

# --- multi-network schedule (positionally matched; single net = one entry) ---
# Names parsed b<blocks>c<channels> (model_config.net_config_from_name). At any
# iter the active selfplay net is the largest SELFPLAY_SCHEDULE threshold (cum
# selfplay rows) crossed; lowest threshold must be 0.
NETWORKS="b3c64, b5c96"
SELFPLAY_SCHEDULE="0, 2e8"

# --- value semantics (2048-specific; NOT in the mainline gomoku config) ---
# GAMMA:       discount for the expected-discounted-score return.
# TD_STEPS:    value target = n-step TD bootstrap on the MCTS root value
#              (0 = full Monte-Carlo return-to-go; high variance — avoid).
# VALUE_SCALE: the value head ALWAYS regresses h(raw)/VALUE_SCALE, where h is the
#              invertible MuZero scaling h(x)=sign(x)(sqrt(|x|+1)-1)+eps*x
#              (python/value_transform.py <-> cpp/infer_server_2048.h::inv_value_h;
#              search decodes via h^-1). h() compresses 2048's fat-tailed large
#              returns, so VALUE_SCALE lives in h-SPACE: h(20k)~160 -> /30 ~ 5.
#              (The old VALUE_TRANSFORM=0 linear path was removed.)
GAMMA=0.999
TD_STEPS=10
VALUE_SCALE=30

# --- MCTS simulation warmup (warmup.py; STAGES vs cumulative-row SCHEDULE,
#     positionally matched, both required and same length). ---
NUM_SIMULATIONS_STAGES="200, 300, 400"
NUM_SIMULATIONS_SCHEDULE="0, 1e8, 2e8"

# --- Gumbel sequential halving (root search algo) ---
GUMBEL_M=16
GUMBEL_C_VISIT=50.0
GUMBEL_C_SCALE=1.0

# --- non-root PUCT (in-tree selection at decision nodes; ROOT stays Gumbel) ---
# KataGo enhancements ported from V7.x (skyzero_2048.h::select_action). Defaults
# below = plain PUCT (all enhancements OFF). The PUCTablation FULL combo (log +
# variance + FPU) was the one clear gomoku win — A/B it on 2048 by copying this
# config and setting:
#   C_PUCT_LOG=0.45  FPU_REDUCTION_MAX=0.2  CPUCT_UTILITY_STDEV_SCALE=0.85
# Note CPUCT_UTILITY_STDEV_PRIOR is in NORMALIZED [0,1] units (KataGo's 0.40 in
# [-1,1] -> ~0.20 here); 2048 measures the stdev in MuZero min-max space.
NON_ROOT_SEARCH_ALGO=puct   # puct (default) | gumbel (Full-Gumbel eq.14 in-tree)
# Tree reuse: carry the realized post-move subtree across plies (warm-start; the
# root still runs NUM_SIMULATIONS fresh Gumbel-SH sims on top). 2048 games are
# long, so reuse adds effective depth cheaply. 0 = off (conservative default;
# A/B it on — likely a Pareto efficiency win). Selfplay-only.
ENABLE_TREE_REUSE=1
# clear-before-full (KataGo clearBotBeforeSearch): with PCR on, full/recorded
# searches drop the carried subtree (clean N-visit target + effective root
# noise); only cheap searches reuse. Needs ENABLE_TREE_REUSE=1 + FAST_SEARCH_PROB>0
# to matter. 0 = off.
# NOTE: this hybrid run sets FAST_*_SEARCH_ALGO != the full algo (decoupled), so
# the selfplay loop forces tree reuse OFF for the whole game anyway (mixed gumbel/
# puct trees can't warm-start each other) — same as V7.8 HybridPCR's hybrid arm.
CLEAR_TREE_BEFORE_FULL_SEARCH=1
C_PUCT=1.25
C_PUCT_LOG=0
C_PUCT_BASE=500
FPU_REDUCTION_MAX=0
CPUCT_UTILITY_STDEV_SCALE=0
CPUCT_UTILITY_STDEV_PRIOR=0.20
CPUCT_UTILITY_STDEV_PRIOR_WEIGHT=2.0

# --- ROOT search algorithm ---
# gumbel (default; sequential halving) | puct (per-sim root PUCT; REQUIRES
# NON_ROOT_SEARCH_ALGO=puct). root=puct selfplay needs root exploration via
# Dirichlet noise (ROOT_DIRICHLET_ALPHA>0) + forced playouts; the training target
# becomes the pruned-visit distribution and the move is temperature-sampled (LCB
# is eval-only). The knobs below are read only when ROOT_SEARCH_ALGO=puct.
ROOT_SEARCH_ALGO=puct
# Root exploration for root=puct selfplay. V7.8 leaves these as cfg_get defaults
# (noise_weight 0.25 / desired-per-child 2 / chosen-move 0.15,early 0.75,hl 19),
# but V2's binary defaults them OFF, so set them explicitly here to match V7.8.
#ROOT_FPU_REDUCTION_MAX=0.0
ROOT_DESIRED_PER_CHILD_VISITS_COEFF=2   # forced playouts on (KataGo root=puct)
ROOT_DIRICHLET_ALPHA=0.8                # >0 enables root Dirichlet noise (per 4 dirs)
ROOT_NOISE_FRAC=0.25                    # = V7.8 ROOT_DIRICHLET_NOISE_WEIGHT
# Move sampling + root-prior exploration (root=puct only; interpolated early->late
# over the game by *_HALFLIFE turns, rescaled by board area=16). CHOSEN_MOVE_TEMP
# samples the played move over pruned visits (0=argmax); ROOT_POLICY_TEMPERATURE
# flattens the root priors (1=off). Full KataGo LCB (eval-only) is always wired.
CHOSEN_MOVE_TEMPERATURE=0.15            # late temperature
CHOSEN_MOVE_TEMPERATURE_EARLY=0.75     # early-game temperature (= V7.8 default)
CHOSEN_MOVE_TEMPERATURE_HALFLIFE=19
#ROOT_POLICY_TEMPERATURE=1.0
#ROOT_POLICY_TEMPERATURE_EARLY=1.0

# --- Playout Cap Randomization (fastSearch; selfplay-only) ---
# Per move, with FAST_SEARCH_PROB, run a cheap search (FAST_SEARCH_FRACTION of the
# budget, root exploration off) whose training row gets weight
# FAST_SEARCH_TARGET_WEIGHT (0 = the row only scaffolds value/TD chains). 0 = off.
# KataGo selfplay: prob 0.75, weight 0, fraction 1/6.
FAST_SEARCH_PROB=0.75
FAST_SEARCH_TARGET_WEIGHT=0
FAST_SEARCH_FRACTION=0.16667
# HybridPCR fast-search algo override: the cheap PCR search runs Full-Gumbel while
# the full (recorded) search runs PUCT above. Empty/unset = inherit the full algo
# (control arm). Differing from the full pair makes the fast search "decoupled" ->
# the whole game runs with tree reuse off (mixed gumbel/puct trees, see above).
FAST_ROOT_SEARCH_ALGO=gumbel
FAST_NON_ROOT_SEARCH_ALGO=gumbel

# --- Policy-Surprise data weighting (selfplay-only; per game) ---
# Re-weights training rows by policy KL(target||nn) + scalar value surprise:
# surprising positions get more weight, and fast-search (weight-0) rows get
# resurrected when surprising. 0/0 = off. KataGo-ish: policy 0.45, value 0.09.
POLICY_SURPRISE_DATA_WEIGHT=0
VALUE_SURPRISE_DATA_WEIGHT=0

# --- Side positions (selfplay-only) ---
# Per move, with SIDE_POSITION_PROB, fork one alternative move off the main line,
# search it (SIDE_POSITION_VISITS, <=0 = full NUM_SIMULATIONS), and emit an extra
# off-policy training row at full weight. 0 = off. KataGo selfplay value ~0.02.
SIDE_POSITION_PROB=0
SIDE_POSITION_VISITS=0

# --- inference-time stochastic D4 symmetry (selfplay-only) ---
# Before each NN eval, apply a random dihedral transform to the input and undo it
# on the policy (action-RELABELED via the verified ACTION_PERM, NOT a plain plane
# rotation — the 2048 trap). Cheap test-time robustness; the net is already
# D4-augment-trained. Gated separately for the root eval vs in-tree (child/leaf)
# evals. 0 = off. KataGo/mainline selfplay runs both on; default 0 here to keep
# the baseline plain (A/B them on).
ENABLE_STOCHASTIC_TRANSFORM_ROOT=0
ENABLE_STOCHASTIC_TRANSFORM_CHILD=0

# (Gomoku-only — intentionally dropped for 2048: MAIN_RULE / BOARD_SIZES /
#  RULES mixing / balanced opening / policy init / soft-resign reduceVisits.)

# --- network internals ---
# FULL_NET=0 -> compact BatchNorm net (nets.Net2048, default). FULL_NET=1 -> the
# faithful KataGo nested-bottleneck net (full_nets.Net2048NBT: fixscale norm +
# RepVGG init + 3-stat board-factor gpool), scalar-value/4-direction adapted.
# Applies to every NETWORK in the schedule. C_MID/C_GPOOL auto-derive from the
# trunk width (override only to pin them); VALUE_HIDDEN sets the value MLP width.
FULL_NET=0
VALUE_HIDDEN=64

# --- training (niceties ported from mainline train.py -> python/train.py) ---
BATCH_SIZE=128
LR=5e-4
GRAD_CLIP=2.0
WEIGHT_DECAY=0            # AdamW decoupled WD (mainline baseline uses 3e-5)
ENABLE_AMP=1             # autocast + GradScaler (no-op on cpu)
# SWA: EMA-averaged weights. When on, export_model.py traces the SWA weights
# (not the raw fast weights). swa = avg + (1/SWA_SCALE)*(cur-avg), snapshotted
# every SWA_PERIOD_STEPS trained steps. ENABLE_SWA=0 falls back to raw weights.
ENABLE_SWA=1
SWA_SCALE=8
SWA_PERIOD_STEPS=200
# Lookahead (in-loop): every LOOKAHEAD_K steps, slow += alpha*(fast-slow) and
# copy back; the optimizer LR is auto-divided by alpha so LR above stays the
# effective LR. LOOKAHEAD_K=0 disables.
LOOKAHEAD_K=6
LOOKAHEAD_ALPHA=0.5
# KataGomo 5-stage LR warmup over LR_WARMUP_SAMPLES trained samples (0.20→1.00).
ENABLE_LR_WARMUP=1
LR_WARMUP_SAMPLES=6e6

# --- pipeline: FIXED train + gate-ordered adaptive selfplay (V7.3 model;
#     replaces the old 2048 token bucket). compute_selfplay_target.py +
#     docs/design_fixed_train_adaptive_selfplay.md. ---
#   train_steps/iter = TRAIN_SAMPLES_PER_EPOCH / BATCH_SIZE (fixed).
#   selfplay target_cum += TRAIN_SAMPLES_PER_EPOCH / TARGET_REPLAY_RATIO each
#   iter; deficit vs cumulative selfplay.tsv rows is produced before training.
#   TARGET_REPLAY_RATIO = soft UPPER bound on avg times a row is trained on.
TARGET_REPLAY_RATIO=6
TRAIN_SAMPLES_PER_EPOCH=256000      # 2000 steps at batch 128 (~1 epoch/iter)
DAEMON_SETTLE_SECONDS=60            # daemon flushes in-flight rows to selfplay.tsv
# Cold-start rows/game over-estimate (2048-specific; mainline uses board area =
# 16 for 4x4, far too low — 2048 games run hundreds of moves). Only affects
# iter 0; the order self-corrects from selfplay.tsv once data exists.
COLD_START_ROWS_PER_GAME=1000

# --- plotting cadence (view_loss.py) ---
PLOT_EVERY_SAMPLES=100000

# --- KataGo three-parameter power-law shuffle window (shuffle.py) ---
#   N <= M:  W(N) = N                                  (shuffle skipped)
#   N >  M:  W(N) = (N^E - M^E)/(E*M^(E-1))*IWPR + M
MIN_ROWS=250000              # M
TAPER_WINDOW_EXPONENT=0.65   # E
EXPAND_WINDOW_PER_ROW=0.4    # IWPR
KEEP_TARGET_ROWS=20000000    # hard cap; uniform-subsample older tail above it

# --- shuffle execution ---
SHUFFLE_WORKERS=10
OVERLAP_SHUFFLE=1            # shuffle(N-1) overlaps iter N's gate wait
ENABLE_OOW_CLEANUP=1        # delete NPZ past the window boundary

# --- parallel selfplay (per-GPU; internal/selfplay.sh maps to the 2048 binary's
#     CLI args: WORKERS_PER_GPU->--threads, SLOT_GAMES->--slot-games,
#     INFERENCE_SERVERS_PER_GPU->--server-threads, INFERENCE_BATCH_SIZE->--batch,
#     INFERENCE_WAIT_US->--wait-us). ---
WORKERS_PER_GPU=16
SLOT_GAMES=64               # lockstep games per worker (2048-specific)
INFERENCE_SERVERS_PER_GPU=2
INFERENCE_BATCH_SIZE=512
INFERENCE_WAIT_US=150

# --- misc / orchestration ---
MAIN_GPU=0
MAX_TIME_SECONDS=0         # >0: also stop after this many seconds of loop time
PROBE_NUM_SIMULATIONS=400  # mcts_probe sims (empty-board root-value diagnostic)
PROGRESS_SECS=15           # selfplay games/s progress line every N sec (0=off)
DAEMON_RELOAD_POLL_MS=2000 # daemon: models/latest.pt mtime poll interval
DEVICE=cuda

# --- async continuous-selfplay loop (scripts/faster_run.sh ONLY; run.sh ignores) ---
# faster_run.sh runs selfplay as a persistent --daemon producer (no per-iter games
# barrier -> kills 2048's long-game tail) + a consumer that trains on a cadence.
# Cadence reuses TARGET_REPLAY_RATIO as the replay multiplier. These are optional
# (sensible defaults shown); uncomment to override.
#ASYNC_ROWS_PER_CYCLE=42667   # new rows before a train cycle (default = TRAIN_SAMPLES_PER_EPOCH/TARGET_REPLAY_RATIO)
#ASYNC_POLL_SECONDS=30        # poll interval while waiting for fresh data
#ASYNC_SELFPLAY_GPUS=0        # comma list of GPUs to run daemons on (default: all 0..GPU_NUM-1)
#MAX_TRAIN_BUCKET_SIZE=512000 # cap banked train budget (default 2*TRAIN_SAMPLES_PER_EPOCH)

# --- periodic eval (2048 single-agent: avg score + tile reach; no Elo) ---
EVAL_EVERY_ITERS=10
EVAL_GAMES=100
EVAL_MAX_MOVES=4000

# Shared paths: DATA_DIR -> configs/<exp>/paths.cfg; LIBTORCH/NVCC/PY ->
# scripts/env_paths.cfg. Per-machine overrides go in *.cfg.local (these flat
# assignments clobber pre-exported env).
