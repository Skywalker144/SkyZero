# Config for human-vs-AI play (scripts/play_web.sh) and the periodic C++ eval.
# Board size and value semantics come from run.cfg; this file only holds the
# (heavier) MCTS / inference settings used off the training loop — tune freely
# without touching training.

# Heavier search than selfplay for stronger play / sharper eval.
NUM_SIMULATIONS=800

# Gumbel sequential halving (deterministic for eval/play — no root noise).
GUMBEL_M=16
GUMBEL_C_VISIT=50.0
GUMBEL_C_SCALE=1.0
GUMBEL_NOISE_ENABLED=0

# [P3] Inference symmetry / stochastic transform — off for fastest single-
# forward play; not yet consumed by the 2048 C++ (ported in P3).
#ENABLE_STOCHASTIC_TRANSFORM_ROOT=0
#ENABLE_STOCHASTIC_TRANSFORM_CHILD=0
